<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таблицы Шульте</title>

<!--
=====================================================================
ДОКУМЕНТАЦИЯ — ТАБЛИЦЫ ШУЛЬТЕ
Один файл index.html, без бэкенда. Подходит для GitHub Pages:
просто положить файл в репозиторий и включить Pages для ветки.
=====================================================================

ВСЕ ГОРЯЧИЕ КЛАВИШИ (сводка; подробности — в соответствующих разделах
ниже). Первая буква — английская раскладка (физическая клавиша),
через слэш — что получится на русской раскладке (ЙЦУКЕН) на этой же
физической клавише.
- + / −                    — зум таблицы (только во время игры)
- U/Г                      — вкл/выкл иконку-глаз (только во время игры)
- P/З                      — увеличить размер глаза (во время игры)
- O/Щ                      — уменьшить размер глаза (во время игры)
- L/Д                      — увеличить прозрачность глаза (во время игры)
- K/Л                      — уменьшить прозрачность глаза (во время игры)
- R/К (удержание)          — показать рекорды под плитками размеров
- Shift+2 ... Shift+9, Shift+0 — сбросить рекорд ОДНОЙ таблицы (2х2 ... 9х9, 10х10)
                              ТЕКУЩЕГО уровня (с подтверждением через confirm())
- B/И (удержание)          — окно информации на весь экран (600×800)
- N/Т                      — открыть окно ввода таймера обратного отсчёта,
							 после ввода нажать кнопку enter для поддтверждения
                              (повторное нажатие — открыть его снова,
                              например чтобы ввести новое время)
- Средняя кнопка мыши (удержание) — подсказка следующей цифры
- Esc или прокрутка колеса вверх   — выйти из таблицы в меню с выбором таблиц
- Space или прокрутка колеса вниз  — рестарт текущей таблицы

ЦВЕТА И ШРИФТ
- :root { --tile-text: #8e8e8e; } — цвет текста на всех плитках,
  таймерах под плитками и иконке глаза (через --eye-color).
- Шрифт — PT Sans Bold, зашит прямо в файл через @font-face с
  base64 (см. начало <style> в <head>) — работает полностью
  офлайн, без обращения к Google Fonts или интернету вообще.

ГЛАВНОЕ МЕНЮ (выбор размера таблицы)
- .menu-grid { gap; width; max-width } — отступы между плитками
  и общая ширина блока меню.
- Раскладка плиток 2/5/8, 3/6/9, 4/7/10 задаётся через
  grid-auto-flow: column в .menu-grid (убрать строку — вернётся
  обычный построчный порядок 2,3,4 / 5,6,7 / 8,9,10).
- .menu-tile { font-size; aspect-ratio } — размер текста "NxN"
  и пропорции плитки.
- Под каждой плиткой — строка с рекордом (см. раздел "РЕКОРДЫ").

РЕКОРДЫ (клавиша R, физически она же К в русской раскладке)
- Никакой отдельной плашки/окна — просто текст под каждой плиткой
  размера (.tile-record), обычно невидимый (visibility: hidden,
  место зарезервировано, чтобы плитки не прыгали). Пока зажата
  R/К — текст становится видимым и показывает лучшее время по
  этому размеру для текущего уровня (или 00:00:00, если рекорда
  ещё нет). Отпустили клавишу — текст снова скрыт.
  Ключи в localStorage не изменились: schulte-best-<level>-<size>.
- Внешний вид — в :root: --records-font-size, --records-gap
  (отступ от плитки до строки рекорда), --records-color.
- Shift+2, Shift+3, Shift+4, Shift+5, Shift+6, Shift+7, Shift+8,
  Shift+9, Shift+0 — сбросить рекорд ОДНОЙ конкретной таблицы
  (2х2, 3х3, 4х4, 5х5, 6х6, 7х7, 8х8, 9х9, 10х10 соответственно)
  ТОЛЬКО текущего уровня (с подтверждением через confirm() — как и
  раньше, окно подтверждения есть у всех кнопок/клавиш сброса).
  Остальные размеры и другие уровни не затрагиваются. Клавиша
  Ctrl+Shift+R (сброс всех рекордов уровня разом) убрана.

ОКНО ИНФОРМАЦИИ (клавиша B, физически она же И в русской раскладке)
- Пока зажата B/И — во весь экран (поверх всего интерфейса)
  показывается окно #info-overlay размером 600×800px (ширина×высота)
  с текстом внутри (#info-box). Работает на любом экране. Отпустили
  клавишу — окно пропадает, всё, что было на экране до этого,
  видно как прежде (само содержимое остальных экранов никуда
  не девалось, оно просто было перекрыто окном информации).
- СВОЙ ТЕКСТ СЮДА: правь прямо содержимое <div id="info-box">...</div>
  в <body> (ищи по id="info-box"). Сейчас там короткая заглушка "тут
  будет инфа если я доберусь до этого", БЕЗ обёртки-класса
  "info-glyphs" — поэтому размер шрифта регулируется переменной
  :root: --info-font-size (сейчас 40px). Если в будущем текст станет
  длинным/многострочным — оберни содержимое в <div class="info-glyphs">
  (как было раньше), тогда шрифт возьмётся из ДРУГОЙ переменной
  :root: --info-glyphs-font-size, а не из --info-font-size — окно
  само начнёт прокручиваться, если строки не влезли (overflow: auto).
  ВАЖНО: у короткого текста без класса "info-glyphs" размер меняется
  ТОЛЬКО через --info-font-size, у длинного текста С классом
  "info-glyphs" — ТОЛЬКО через --info-glyphs-font-size; это две
  разные переменные, менять нужно ту, что соответствует текущей
  обёртке, иначе изменение видно не будет.

ТАЙМЕР ОБРАТНОГО ОТСЧЁТА (клавиша N, физически она же Т в русской раскладке)
- N/Т — открывает маленькое окно ввода (#countdown-input-overlay) с
  текстовым полем. Вводишь число, жмёшь Enter:
  · целое число — это минуты ("5" → 5 минут);
  · число с точкой или запятой И числом ПЕРЕД разделителем — минуты
    и секунды, после разделителя читается как есть, а не как
    десятичная дробь ("5.20"/"5,20" → 5 минут 20 секунд; "5.2" →
    5 минут 2 секунды); если после разделителя указано больше 60 —
    секунды не считаются вообще, остаётся 0 ("3.61" → просто 3 мин);
  · точка/запятая БЕЗ числа перед ней — всё, что после неё, это
    секунды целиком, без деления на минуты (".15" → 15 секунд,
    ",133" → 133 секунды).
- Пока отсчёт идёт — на экране НИЧЕГО не видно (ни бегущего
  времени, ни плашки), таймер тикает в фоне. Когда время выходит —
  на 5 секунд появляется плашка #countdown-display с текстом
  "ВРЕМЯ ВЫШЛО", потом сама пропадает (длительность показа — 5000мс
  в setTimeout внутри startCountdown(), ищи "ВРЕМЯ ВЫШЛО" в <script>).
  Цвет текста "ВРЕМЯ ВЫШЛО" — красный на ВСЕХ уровнях
  (:root: --countdown-expired-color, применяется в CSS-правиле
  #countdown-display.expired). Остальной вид плашки (шрифт, размер,
  положение) — как у обычных плиток размеров, см. ниже.
- Повторное нажатие N/Т снова открывает окно ввода: ввёл новое
  число — текущий отсчёт заменяется и стартует заново; нажал Enter
  на пустом поле — текущий отсчёт не трогается, окно просто
  закрывается.
- Окно ввода и плашка "ВРЕМЯ ВЫШЛО" — одного размера, в одном месте
  (:root: --countdown-top/--countdown-width/--countdown-height/
  --countdown-font-size, у самой плашки "ВРЕМЯ ВЫШЛО" ещё и свой,
  уменьшенный шрифт --countdown-expired-font-size, т.к. текст длиннее
  времени). Цвет — те же переменные, что у обычных плиток размеров
  (--tile / --tile-text).
- Позиция по горизонтали — АВТОМАТИЧЕСКАЯ: правый край окна всегда
  выравнивается по правому краю кнопок "∞" (столбик уровней) —
  JS-функция alignCountdownToLevelGrid(), вызывается при показе
  меню размеров и при изменении размера окна браузера. --countdown-
  left в :root — просто запасной вариант на случай, если JS ещё не
  успел отработать. Если нужно чуть сместить готовое выравнивание —
  подправь --countdown-right-offset (в px, можно отрицательное).

ТАБЛИЦА В ИГРЕ
- COL_GAP / SHADOW_OFFSET (в начале <script>) — боковой зазор
  между плитками и высота "тени". Вертикальный зазор всегда
  считается как SHADOW_OFFSET + COL_GAP, чтобы расстояние от низа
  тени до следующей плитки было равно боковому зазору.
- @keyframes shake-x — амплитуда тряски при неверном клике (px).
  Используется только для уровней БЕЗ colorFeedback (см. УРОВНИ).
- Для уровней с colorFeedback (по умолчанию — 3 и 4) вместо тряски
  клетка на 0.1с красится в зелёный/красный: --flash-correct-color
  (#b3ffb3 @ 50%), --flash-wrong-color (#ffcccc @ 50%) в :root.
  Число при верном ответе не пропадает, клетка остаётся кликабельной —
  повторный клик по уже отвеченной клетке мигает красным.
- Масштаб всей таблицы: клавиши + / − (зум из центра экрана),
  шаг 0.1, без верхнего предела, нижний предел 0.2. Сохраняется
  в localStorage отдельно для каждого размера и уровня.

ФИНАЛЬНАЯ ПЛАШКА (после прохождения таблицы)
- #finish-overlay { padding } — размер самой плашки.
- #finish-time { font-size } — размер шрифта времени.
- #finish-errors { font-size } — размер строки "ОШИБОК: N"
  (считается каждый неверный клик за попытку, сбрасывается
  при каждом новом запуске/рестарте).
- Для уровней с instantRestart (по умолчанию — 2 и 4) эта плашка
  вообще не показывается: сразу стартует новая таблица того же
  размера, а рекорд всё равно сохраняется в фоне (см. УРОВНИ).

ГЛАЗ (клавиша U, физически она же Г в русской раскладке)
- Работает только во время прохождения таблицы. На экранах
  меню/выбора уровня глаза нет. Если глаз был включён и игрок
  дошёл до конца — на экране с итоговым временем глаз прячется,
  а при следующем запуске/рестарте таблицы появляется снова
  (если не выключить).
- Размер меняется клавишами P/З (+10px) и O/Щ (-10px).
- Прозрачность меняется клавишами L/Д (+10%, до 100%)
  и K/Л (-10%, до минимума 10%).
- Оба параметра сохраняются в localStorage, но только если
  отличаются от стандартных (120px и 100%).
- Картинка глаза встроена в файл как base64 и перекрашивается
  через CSS mask-image, поэтому меняется через --eye-color.
- Сам факт "включён/выключен" (eyeOn) тоже сохраняется в localStorage
  (ключ schulte-eye-on) при каждом нажатии U/Г и читается при загрузке
  страницы — поэтому после перезагрузки страницы, если глаз был
  включён, он останется включённым (появится, как только начнётся
  игра — на экранах меню его по-прежнему не видно).

СРЕДНЯЯ КНОПКА МЫШИ
- Зажата — в центре экрана показывается следующая нужная
  цифра/буква тем же шрифтом, что и в таблице. Отжата — пропадает.
- Цвет подсказки — :root: --peek-color (сейчас красный).

НАВИГАЦИЯ
- Esc или прокрутка колеса вверх — выйти из таблицы в меню размеров
  (там же слева виден столбик уровней — отдельного экрана выбора
  уровня больше нет, см. УРОВНИ ниже).
- Space или прокрутка колеса вниз — рестарт текущей таблицы
  (новое расположение, таймер и счётчик ошибок с нуля).

УРОВНИ
- Массив LEVELS в начале <script> — по умолчанию 12 уровней
  (id level1..level12, названия "1".."12"), у каждого — полный
  набор размеров 2x2..10x10, как раньше. Рекорды и масштаб
  хранятся отдельно по id, поэтому уровни независимы друг
  от друга. Чтобы поменять название/логику плитки — правьте
  поля name / label(order, total) прямо в массиве.
- Кнопки уровней — сетка по 2 в ряд (1-2, 3-4 ... 11-12) слева
  внутри #menu-screen, показываются на любом уровне вместе
  с плитками размеров (не отдельный экран). Мышью не двигаются,
  положение/размер/зазор — только в CSS (:root: --level-btn-size,
  --level-btn-font-size, --level-btn-gap). Столбик уровней (.level-
  grid) стоит с position: absolute и своим отступом от левого края
  (left: 6vw в CSS), т.е. НЕ участвует в центрировании — за счёт
  этого плитки размеров (.menu-grid) остаются строго по центру
  экрана, как было изначально, а кнопки уровней просто сбоку.
- Кнопка ВЫБРАННОГО сейчас уровня подсвечивается — текст становится
  ярче (--level-btn-active-color в :root, класс .level-tile.active
  в CSS), у остальных кнопок обычный цвет (--tile-text).
- Последний выбранный уровень запоминается: при клике по кнопке
  уровня его id сохраняется в localStorage (schulte-current-level),
  а при загрузке страницы currentLevelId читается оттуда ДО того,
  как создаются кнопки уровней — поэтому после перезагрузки страницы
  открывается тот же уровень, на котором игрок был в прошлый раз
  (если уровня с таким id вдруг нет — используется уровень 1).

ОПИСАНИЕ КАЖДОГО УРОВНЯ (кнопка / что происходит в игре)
- Уровень 1 «Обычный уровень» — классическая таблица Шульте: клик
  строго по нужной клетке, число остаётся на месте до конца, при
  ошибке клетка трясётся (shake-x), плашка с итоговым временем
  показывается после прохождения.
- Уровень 2 «∞» — то же самое, что уровень 1, но с instantRestart:
  после прохождения таблицы плашка с итогом НЕ показывается, сразу
  стартует новая таблица того же размера (рекорд всё равно
  сохраняется в фоне).
- Уровень 3 «Зелёный/красный» — вместо тряски при клике клетка на
  0.1с красится в зелёный (верно) или красный (неверно), colorFeedback;
  число не исчезает, клетка остаётся кликабельной.
- Уровень 4 «∞» — то же, что уровень 3 (colorFeedback), плюс
  instantRestart: следующая таблица стартует сразу без плашки итога.
- Уровень 5 «Трёхзначный» — обычная механика клика по клетке (как
  уровень 1), но числа трёхзначные (001, 002, ... с ведущими нулями)
  на любом размере таблицы, а не только на больших.
- Уровень 6 «∞» — то же, что уровень 5 (трёхзначные числа), плюс
  instantRestart.
- Уровень 7 «С буквами» — обычный клик по клетке, но при верном
  ответе число заменяется случайными заглавными русскими буквами
  (столько букв, сколько было цифр в числе): revealLetter.
- Уровень 8 «∞» — то же, что уровень 7 (revealLetter), плюс
  instantRestart.
- Уровень 9 «1 за другим» — clickAnywhere: клик засчитывается в
  любое место игрового экрана, конкретная клетка не важна; на
  финальной плашке не показывается строка "ОШИБОК: N" (hideErrorsLabel).
- Уровень 10 «∞» — то же, что уровень 9 (clickAnywhere +
  hideErrorsLabel), плюс instantRestart.
- Уровень 11 «1 за другим цветной» — clickAnywhere (клик где угодно
  на экране) вместе с colorFeedback (зелёная подсветка клетки с
  верным числом) и hideErrorsLabel (без строки "ОШИБОК: N" на плашке
  итога).
- Уровень 12 «∞» — то же, что уровень 11 (clickAnywhere +
  colorFeedback + hideErrorsLabel), плюс instantRestart.

ХРАНЕНИЕ ДАННЫХ
- Все настройки (масштаб, рекорды, размер/прозрачность глаза, выбранный
  уровень, вкл/выкл глаза) хранятся в localStorage браузера — то есть
  на конкретном устройстве/браузере, без сервера. На другом устройстве
  или в другом браузере будут значения по умолчанию.
- Ключ schulte-current-level — id последнего выбранного уровня
  (level1..level12). Сохраняется при клике по кнопке уровня, читается
  один раз при загрузке страницы (перед созданием кнопок уровней в
  <script>) — так что после перезагрузки страница открывается сразу
  на том уровне, на котором он был в прошлый раз.
- Ключ schulte-eye-on — состояние глаза (включён/выключен), 'true'
  либо отсутствует. Сохраняется при каждом переключении по U/Г,
  читается при загрузке страницы. Размер и прозрачность глаза
  (schulte-eye-size / schulte-eye-opacity) сохранялись и раньше —
  теперь так же сохраняется и сам факт "включён/выключен".
===================================================================== -->

<style>
/* ШРИФТ PT SANS BOLD — зашит прямо в файл (base64), страница
   работает полностью офлайн, без обращения к Google Fonts.
   Two @font-face — latin (цифры/латиница/пунктуация) и cyrillic
   (кириллица), ровно то начертание (700 normal), которое
   реально используется в интерфейсе. Чтобы поменять шрифт —
   замени base64-строки ниже на новые (сконвертировать .ttf/.otf
   в woff и получить base64 можно, например, на transfonter.org,
   а затем `base64 -w0 файл.woff`).*/
@font-face {
  font-family: 'PT Sans';
  font-style: normal;
  font-weight: 700;

  :root {
    --bg: #1a1a1a;
    --tile: #5a5a5a;
    --tile-text: #8e8e8e;   /* <-- цвет цифр/текста на плитках меняется здесь */
    --shadow-color: #303030;

    /* ---- иконка "глаз" (показывается по клавише U/Г, только во время игры) ---- */
    --eye-size: 120px;             /* <-- размер иконки глаза (меняется клавишами P/З и O/Щ) */
    --eye-color: var(--tile-text); /* <-- цвет иконки глаза */
    --eye-opacity: 1;              /* <-- прозрачность глаза (меняется клавишами L/Д и K/Л) */

    /* ---- слой РЕКОРДЫ (текст под плиткой размера, виден пока зажата R/К) ---- */
    --records-color: var(--tile-text);   /* <-- цвет текста рекорда */
    --records-font-size: 22px;           /* <-- размер шрифта строки рекорда */
    --records-gap: 12px;                 /* <-- отступ от плитки до строки рекорда */

    /* ---- кнопки уровней (вертикальный столбик, левый край главного экрана) ---- */
    --level-btn-size: 60px;      /* <-- сторона квадратной кнопки уровня */
    --level-btn-font-size: 22px; /* <-- размер цифры на кнопке уровня */
    --level-btn-gap: 16px;       /* <-- расстояние между кнопками уровней */
    --level-btn-infinity-size: 30px; /* <-- размер символа ∞ (крупнее обычной цифры, т.к. визуально мельче) */
    --level-btn-active-color: #e4e4e4; /* <-- цвет текста ВЫБРАННОГО сейчас уровня (ярче обычного) */

    /* ---- окно информации (клавиша B/И) ---- */
    --info-font-size: 40px;      /* <-- размер шрифта текста в окне информации */
    --info-glyphs-font-size: 15px; /* <-- размер шрифта у списка символов шрифта (40 строк) */

    /* ---- таймер обратного отсчёта (клавиша N/Т) ----
       Правый край окна автоматически выравнивается по правому краю
       кнопок "∞" (JS-функция alignCountdownToLevelGrid, вызывается
       при показе меню размеров и при ресайзе окна) — так что left
       ниже используется только как запасной вариант, пока JS ещё
       не отработал. Если нужно чуть сдвинуть готовое выравнивание —
       используй --countdown-right-offset (в px, может быть и
       отрицательным). */
    --countdown-top: 20px;         /* <-- отступ сверху */
    --countdown-left: 6vw;         /* <-- запасная позиция слева (пока JS не выровнял) */
    --countdown-right-offset: 0px; /* <-- точная подстройка авто-выравнивания по правому краю */
    --countdown-width: 340px;      /* <-- ширина плашки/окна ввода */
    --countdown-height: 120px;      /* <-- высота плашки/окна ввода */
    --countdown-font-size: 56px;   /* <-- размер шрифта времени/поля ввода */
    --countdown-expired-font-size: 44px; /* <-- размер шрифта у текста "ВРЕМЯ ВЫШЛО" (текст длиннее) */
    --countdown-expired-color: #ff3b3b; /* <-- цвет текста "ВРЕМЯ ВЫШЛО" (красный, как раньше было на уровне 3), теперь на ВСЕХ уровнях */

    /* ---- подсказка по средней кнопке мыши ---- */
    --peek-color: #e5484d;       /* <-- цвет подсказки (сейчас красный), меняется тут */

    /* ---- подсветка клетки при верном/неверном ответе (уровни с colorFeedback) ----
       Цвет и прозрачность — раздельные переменные (CSS ниже собирает их через
       color-mix). Длительность мигания в мс — JS-константы FLASH_CORRECT_DURATION_MS
       и FLASH_WRONG_DURATION_MS в начале <script> (ищи "Настройки мигания клеток"). */
    --flash-correct-color: #b3ffb3;   /* <-- цвет плашки при верном ответе */
    --flash-correct-opacity: 50%;     /* <-- прозрачность плашки при верном ответе */
    --flash-wrong-color: #ffcccc;     /* <-- цвет плашки при неверном ответе */
    --flash-wrong-opacity: 50%;       /* <-- прозрачность плашки при неверном ответе */
  }


  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: #ddd;
    font-family: 'PT Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100%;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  /* ---------- LEVEL SELECT ----------
     Вертикальный столбик кнопок уровней (по умолчанию 10, "1".."10").
     Теперь это не отдельный экран, а левая колонка внутри #menu-screen —
     кнопки уровней видны вместе с плитками размеров на любом уровне.
     Положение — только через CSS ниже (gap/padding у #menu-screen).
     Кнопки НЕ двигаются мышью — только правкой настроек тут
     и данных в массиве LEVELS. */

  .level-grid {
    position: absolute;         /* <-- вынесен из потока, чтобы не сдвигать центр .menu-grid */
    left: 4vw;                  /* <-- отступ столбика уровней от левого края экрана */
    top: 50%;
    transform: translateY(-50%);
    display: grid;
    grid-template-columns: max-content max-content; /* <-- 2 кнопки в ряд (1-2, 3-4 ... 11-12), ширина колонки — по содержимому */
    justify-items: center;      /* <-- кнопки строго по центру своей колонки */
    gap: var(--level-btn-gap);
  }

  .level-tile {
    background: var(--tile);
    border: none;
    border-radius: 12px;
    color: var(--tile-text);
    font-family: 'PT Sans', sans-serif;
    font-size: var(--level-btn-font-size);
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--shadow-color);
    min-width: var(--level-btn-size);  /* <-- минимальная ширина как раньше (квадрат) */
    height: var(--level-btn-size);
    padding: 0 14px;                    /* <-- при длинном названии кнопка расширяется под текст */
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Символ бесконечности (чётные уровни) — отдельный размер шрифта,
     т.к. визуально мельче цифр/текста при том же font-size. */
  .level-tile.level-infinity {
    font-size: var(--level-btn-infinity-size);
  }

  .level-tile:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--shadow-color);
  }

  /* Кнопка выбранного сейчас уровня — текст чуть ярче остальных.
     Цвет вынесен в отдельную переменную, чтобы менять его отдельно
     от обычного цвета текста кнопок уровней (--tile-text). */
  .level-tile.active {
    color: var(--level-btn-active-color);
  }

  /* ---------- MENU (выбор размера таблицы) ---------- */

  #menu-screen {
    display: none;
    flex-direction: row;
    align-items: center;
    justify-content: center;   /* <-- .menu-grid (плитки размеров) строго по центру экрана */
    width: 100%;
    height: 100%;
    padding: 20vh 24px;
    position: relative;         /* <-- точка отсчёта для абсолютного .level-grid */
  }

  /* Размер сетки меню: ширина блока с кнопками задаётся здесь (width / max-width).
     Чтобы изменить расстояние между плитками — меняйте значение gap ниже (статичное, в px).
     grid-auto-flow: column + порядок плиток 2..10 в разметке даёт раскладку:
     2 5 8
     3 6 9
     4 7 10 */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    grid-auto-flow: column;
    gap: 100px;                 /* <-- расстояние между плитками меню (одинаковое по X и Y) */
    width: 70%;                /* <-- общая ширина блока меню */
    max-width: 1080px;          /* <-- ограничение максимальной ширины блока меню */
  }

  /* Размер/форма каждой плитки меню: aspect-ratio задаёт соотношение сторон,
     font-size — размер текста "NxN" — увеличивай/уменьшай это значение. */
  .menu-tile {
    background: var(--tile);
    border: none;
    border-radius: 14px;
    color: var(--tile-text);
    font-family: 'PT Sans', sans-serif;
    font-size: 48px;           /* <-- РАЗМЕР ТЕКСТА НА ПЛИТКАХ ГЛАВНОГО МЕНЮ (меняй тут) */
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--shadow-color);
    aspect-ratio: 2 / 1;       /* <-- соотношение сторон плитки (ширина / высота) */
    width: 100%;
  }

  .menu-tile:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--shadow-color);
  }

  /* Обёртка вокруг плитки размера — стоит в сетке .menu-grid.
     Внутри неё же — строка рекорда (.tile-record), обычно скрытая
     (visibility: hidden — место зарезервировано, чтобы плитки не
     прыгали), видимая только пока зажата клавиша R/К. */
  .menu-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .tile-record {
    margin-top: var(--records-gap);   /* <-- отступ от плитки до строки рекорда */
    font-family: 'PT Sans', sans-serif;
    font-weight: 700;
    font-size: var(--records-font-size); /* <-- размер шрифта рекорда */
    color: var(--records-color);         /* <-- цвет текста рекорда */
    font-variant-numeric: tabular-nums;
    visibility: hidden;                  /* <-- по умолчанию скрыт, но место занимает */
  }

  .tile-record.show {
    visibility: visible;
  }

  /* ---------- GAME ---------- */

  #game-screen {
    display: none;
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* Сетка позиционируется абсолютно и центрируется относительно центра экрана,
     поэтому при изменении масштаба (+/-) она растёт/уменьшается именно из центра. */
  #grid-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  #grid {
    display: grid;
    width: 100%;
    height: 100%;
  }

  .cell {
    background: var(--tile);
    color: var(--tile-text);
    font-family: 'PT Sans', sans-serif;
    border: none;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 6px 0 var(--shadow-color);
    position: relative; /* нужно, чтобы z-index ниже работал предсказуемо */
  }

  .cell.static-empty {
    cursor: default;
  }

  /* Амплитуда тряски при неверном клике — меняйте px-значения ниже. */
  @keyframes shake-x {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-3px); }
    40%  { transform: translateX(3px); }
    60%  { transform: translateX(-2px); }
    80%  { transform: translateX(2px); }
    100% { transform: translateX(0); }
  }

  .cell.shake {
    animation: shake-x 0.3s ease;
  }

  /* Подсветка клетки для уровней с colorFeedback (сейчас — 3 и 4):
     верный ответ — зелёным на 0.3с, неверный — красным на 0.3с,
     без тряски вбок (класс .shake для таких уровней не используется). */
  .cell.flash-correct {
    background: color-mix(in srgb, var(--flash-correct-color) var(--flash-correct-opacity), transparent);
  }

  .cell.flash-wrong {
    background: color-mix(in srgb, var(--flash-wrong-color) var(--flash-wrong-opacity), transparent);
  }

  /* ---------- PEEK (средняя кнопка мыши — показать искомую цифру) ---------- */

  #peek-overlay {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--peek-color);  /* <-- цвет подсказки по средней кнопке мыши */
    font-family: 'PT Sans', sans-serif;
    font-weight: 700;
    pointer-events: none;
    z-index: 1000;
  }

  #peek-overlay.show { display: block; }

  /* ---------- EYE (клавиша U/Г) ----------

     цвет задаёт --eye-color, прозрачность — --eye-opacity,

  /* Чтобы увеличить плашку с результатом — меняй padding ниже.

  #finish-overlay {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--tile);
    border-radius: 14px;
    box-shadow: 0 6px 0 var(--shadow-color);
    padding: 26px 44px;        /* <-- РАЗМЕР ОКНА С ТАЙМЕРОМ (увеличить — увеличить padding) */
    text-align: center;
  }

  #finish-overlay.show {
    display: block;
  }

    font-size: 51px;           /* <-- РАЗМЕР ШРИФТА ИТОГОВОГО ТАЙМЕРА */
    font-weight: 700;
    color: var(--tile-text);
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  #finish-errors {
    margin-top: 10px;
    font-family: 'PT Sans', sans-serif;
    font-size: 24px;           /* <-- размер строки "Ошибок: N" (увеличено на 20%) */
    font-weight: 700;
    color: var(--tile-text);
    opacity: 0.85;
  }

  /* ---------- ОКНО ИНФОРМАЦИИ (клавиша B/И, во весь экран, 600×800) ----------
     Пока зажата B/И — перекрывает собой весь остальной интерфейс.
     Отпустили клавишу — окно прячется, всё, что было под ним,
     видно как прежде (оно никуда не девалось, просто было закрыто). */

  #info-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);      /* <-- перекрывает интерфейс полностью */
    align-items: center;
    justify-content: center;
    z-index: 5000;
  }

  #info-overlay.show { display: flex; }

  #info-box {
    width: 600px;                /* <-- ширина окна информации */
    height: 800px;                /* <-- высота окна информации */
    max-width: 96vw;
    max-height: 96vh;
    background: var(--tile);
    border-radius: 14px;
    box-shadow: 0 6px 0 var(--shadow-color);
    padding: 32px;
    box-sizing: border-box;
    overflow: auto;               /* <-- если содержимое не влезает — появится скролл */
    color: var(--tile-text);
    font-family: 'PT Sans', sans-serif;
    font-weight: 700;
    font-size: var(--info-font-size); /* <-- размер шрифта КОРОТКОГО текста (например "123") */
  }

  /* Стиль для списка символов шрифта (см. #info-box в <body>) — свой,
     более мелкий размер шрифта, чтобы 40 строк помещались в окно. */
  #info-box .info-glyphs {
    font-size: var(--info-glyphs-font-size); /* <-- размер шрифта строк со символами */
    font-weight: 400;
    line-height: 1.5;
    text-align: left;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ---------- ТАЙМЕР ОБРАТНОГО ОТСЧЁТА (клавиша N/Т) ----------
     Два отдельных блока с одинаковыми позицией/размером (см. переменные
     --countdown-* выше): #countdown-input-overlay — окно ввода времени
     (видно, пока открыто), #countdown-display — плашка "ВРЕМЯ ВЫШЛО"
     (видна только 5 секунд после истечения отсчёта, остальное время
     скрыта — самого тикающего таймера на экране не видно). Цвета —
     те же, что у плиток размеров (--tile / --tile-text), как и просили. */
  #countdown-input-overlay,
  #countdown-display {
    display: none;
    position: fixed;
    top: var(--countdown-top);
    left: var(--countdown-left);
    width: var(--countdown-width);
    height: var(--countdown-height);
    background: var(--tile);
    color: var(--tile-text);
    border-radius: 12px;
    box-shadow: 0 4px 0 var(--shadow-color);
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: 'PT Sans', sans-serif;
    font-weight: 700;
    font-size: var(--countdown-font-size);
  }

  #countdown-input-overlay.show,
  #countdown-display.show {
    display: flex;
  }

  /* Текст "ВРЕМЯ ВЫШЛО" длиннее, чем время в поле ввода — свой,
     уменьшенный размер шрифта, чтобы помещался в ту же плашку.
     Цвет — красный на ВСЕХ уровнях (--countdown-expired-color;
     раньше такой красный был только на уровне 3, теперь везде). */
  #countdown-display.expired {
    font-size: var(--countdown-expired-font-size);
    line-height: 1.2;
    color: var(--countdown-expired-color);
  }

  #countdown-input-overlay { z-index: 2100; } /* поверх плашки отсчёта, пока вводим новое время */
  #countdown-display { z-index: 2000; }

  #countdown-input {
    width: 90%;
    background: transparent;
    border: none;
    outline: none;
    text-align: center;
    color: var(--tile-text);
    font-family: 'PT Sans', sans-serif;
    font-weight: 700;
    font-size: var(--countdown-font-size);
  }
</style>
</head>
<body>

<div id="app">

  <div id="menu-screen">
    <div class="level-grid" id="level-grid"></div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <div id="game-screen">
    <div id="grid-wrap">
      <div id="grid"></div>
    </div>
    <div id="finish-overlay">
      <div id="finish-time"></div>
      <div id="finish-errors"></div>
    </div>
  </div>

  <div id="peek-overlay"></div>

  <div id="eye-overlay"></div>

  <div id="info-overlay">
    <div id="info-box">
      тут будет инфа если я доберусь до этого
    </div>
  </div>

  <div id="countdown-input-overlay">
    <input id="countdown-input" type="text" inputmode="decimal" autocomplete="off" placeholder="5 или 5.20" />
  </div>

  <div id="countdown-display"></div>

</div>

<script>
  /* =========================================================
     УРОВНИ
     По умолчанию 12 уровней (id level1..level12), у каждого —
     полный набор размеров 2x2..10x10, как в обычном меню.
     Рекорды и масштаб хранятся отдельно по id, так что уровни
     не мешают друг другу. Чтобы поменять название кнопки или
     то, что показывается на плитке вместо числа — правьте
     name / label(order, total) прямо здесь.

     У каждого уровня пять флагов-модификаторов поведения игры:
     - instantRestart: true — после прохождения таблицы плашка
       с временем/ошибками НЕ показывается, сразу стартует новая
       таблица того же размера. Рекорд при этом всё равно
       сохраняется и виден в меню по удержанию R/К, как обычно.
     - colorFeedback: true — при верном ответе клетка на
       FLASH_CORRECT_DURATION_MS красится в --flash-correct-color
       (с прозрачностью --flash-correct-opacity), при неверном —
       на FLASH_WRONG_DURATION_MS в --flash-wrong-color (с
       --flash-wrong-opacity) БЕЗ тряски вбок; число на клетке при
       верном ответе не исчезает, клетка остаётся кликабельной —
       повторный клик по уже отвеченной клетке тоже мигает красным.
       Цвета/прозрачность — в :root, длительности — JS-константы
       FLASH_CORRECT_DURATION_MS / FLASH_WRONG_DURATION_MS (ищи
       "Настройки мигания клеток" в <script>).
     - revealLetter: true — при верном ответе число заменяется
       случайными заглавными русскими буквами (ALPHABET_RU в
       <script>) — ровно столько букв, сколько было цифр в числе
       (1 цифра → 1 буква, 2 цифры → 2 буквы), тем же шрифтом.
     - clickAnywhere: true — клик по конкретной клетке не нужен,
       засчитывается клик в ЛЮБОЕ место игрового экрана (см.
       глобальный обработчик click рядом с buildGrid — он нарочно
       игнорирует клик по плитке в меню, которым уровень запускается,
       чтобы не засчитывать её как игровой клик).
     - hideErrorsLabel: true — на финальной плашке (см.
       ФИНАЛЬНАЯ ПЛАШКА выше) не показывается строка "ОШИБОК: N"
       вообще (сама плашка с временем всё равно показывается,
       если только вдобавок не включён instantRestart).
     Включены: 2 — instantRestart; 3 — colorFeedback; 4 — оба;
     5/6 — трёхзначные числа на всех размерах (переопределён label),
     6 вдобавок с instantRestart; 7/8 — revealLetter, 8 вдобавок
     с instantRestart; 9 — clickAnywhere + hideErrorsLabel; 10 —
     clickAnywhere + instantRestart; 11 — clickAnywhere +
     colorFeedback + hideErrorsLabel (клик где угодно на экране +
     зелёная подсветка верной клетки теми же параметрами
     цвета/прозрачности/длительности, что и у 3/4); 12 — то же,
     что 11, плюс instantRestart. Правьте/добавляйте по этому же
     принципу.

     НАЗВАНИЯ КНОПОК: у "нечётных" уровней с особым режимом (1, 3,
     5, 7, 9, 11) — словесные названия ("Обычный уровень", "Зелёный/
     красный", "1 за другим" и т.д., правятся ниже через
     LEVELS[i].name). У "чётных" уровней (2/4/6/8/10/12) — они
     являются "бесконечной" версией соседнего нечётного (тот же
     режим + instantRestart), поэтому вместо числа — символ ∞ (см.
     ниже, --level-btn-infinity-size в :root регулирует его размер
     отдельно от остальных кнопок).
     ========================================================= */
  const LEVELS = [];
  for (let i = 1; i <= 12; i++) {
    LEVELS.push({
      id: 'level' + i,
      name: String(i),
      label: (order, total) => String(order).padStart(total <= 9 ? 1 : 2, '0'),
      instantRestart: false,
      colorFeedback: false,
      revealLetter: false,
      clickAnywhere: false,
      hideErrorsLabel: false
    });
  }
  LEVELS[1].instantRestart = true;                       // уровень 2
  LEVELS[2].colorFeedback = true;                         // уровень 3
  LEVELS[3].instantRestart = true;                        // уровень 4
  LEVELS[3].colorFeedback = true;                         // уровень 4
  LEVELS[4].label = (order) => String(order).padStart(3, '0'); // уровень 5 — трёхзначные числа
  LEVELS[5].label = (order) => String(order).padStart(3, '0'); // уровень 6 — трёхзначные числа
  LEVELS[5].instantRestart = true;                        // уровень 6
  LEVELS[6].revealLetter = true;                          // уровень 7 — верный ответ превращается в букву
  LEVELS[7].revealLetter = true;                          // уровень 8 — то же + мгновенный рестарт
  LEVELS[7].instantRestart = true;                        // уровень 8
  LEVELS[8].clickAnywhere = true;                         // уровень 9 — клик где угодно на экране
  LEVELS[8].hideErrorsLabel = true;                        // уровень 9 — на плашке результата не показывать "ОШИБОК: N"
  LEVELS[9].clickAnywhere = true;                         // уровень 10 — то же + мгновенный рестарт
  LEVELS[9].instantRestart = true;                        // уровень 10
  LEVELS[10].clickAnywhere = true;                        // уровень 11 — клик где угодно + зелёная подсветка
  LEVELS[10].colorFeedback = true;                        // уровень 11
  LEVELS[10].hideErrorsLabel = true;                       // уровень 11 — на плашке результата не показывать "ОШИБОК: N"
  LEVELS[11].clickAnywhere = true;                        // уровень 12 — то же + мгновенный рестарт
  LEVELS[11].colorFeedback = true;                        // уровень 12
  LEVELS[11].instantRestart = true;                       // уровень 12

  // Названия кнопок. "Чётные" уровни (2/4/6/8/10/12) — это "бесконечные"
  // версии соседнего нечётного уровня (тот же режим + instantRestart),
  // поэтому вместо числа на них символ бесконечности.
  LEVELS[0].name = 'Обычный уровень';   // уровень 1
  LEVELS[2].name = 'Зелёный/красный';   // уровень 3
  LEVELS[4].name = 'Трёхзначный';       // уровень 5
  LEVELS[6].name = 'С буквами';         // уровень 7
  LEVELS[8].name = '1 за другим';       // уровень 9
  LEVELS[10].name = '1 за другим цветной'; // уровень 11
  LEVELS[1].name = '∞';                // уровень 2  (бесконечный №1)
  LEVELS[3].name = '∞';                // уровень 4  (бесконечный №3)
  LEVELS[5].name = '∞';                // уровень 6  (бесконечный №5)
  LEVELS[7].name = '∞';                // уровень 8  (бесконечный №7)
  LEVELS[9].name = '∞';                // уровень 10 (бесконечный №9)
  LEVELS[11].name = '∞';               // уровень 12 (бесконечный №11)

  const levelGrid = document.getElementById('level-grid');
  const menuGrid = document.getElementById('menu-grid');
  const menuScreen = document.getElementById('menu-screen');
  const gameScreen = document.getElementById('game-screen');
  const grid = document.getElementById('grid');
  const gridWrap = document.getElementById('grid-wrap');
  const finishOverlay = document.getElementById('finish-overlay');
  const finishTime = document.getElementById('finish-time');
  const finishErrors = document.getElementById('finish-errors');
  const peekOverlay = document.getElementById('peek-overlay');
  const eyeOverlay = document.getElementById('eye-overlay');
  const infoOverlay = document.getElementById('info-overlay');

  const sizes = [2,3,4,5,6,7,8,9,10];
  const oddWithGap = new Set([5,7,9]);
  const topPad15 = new Set([2,3,4,5]);
  const topPad10 = new Set([6,7]);

  // Расстояние между плитками внутри таблицы:
  // COL_GAP — зазор по бокам (между соседями в строке).
  // ROW_GAP — зазор по вертикали = высота тени + COL_GAP.
  const COL_GAP = 2;
  const SHADOW_OFFSET = 6;
  const ROW_GAP = SHADOW_OFFSET + COL_GAP;

  // Последний выбранный уровень запоминается в localStorage (ключ
  // schulte-current-level), чтобы после перезагрузки страницы открывался
  // тот же уровень, на котором пользователь был в прошлый раз.
  function loadSavedLevel() {
    let savedId = null;
    try { savedId = localStorage.getItem('schulte-current-level'); } catch (e) {}
    const found = LEVELS.find(l => l.id === savedId);
    return found || LEVELS[0];
  }

  const initialLevel = loadSavedLevel();
  let currentLevelId = initialLevel.id;
  let currentLevel = initialLevel;

  // ---------- уровни ----------
  const levelButtonEls = {};
  LEVELS.forEach(level => {
    const btn = document.createElement('button');
    btn.className = 'level-tile';
    if (level.name === '∞') btn.classList.add('level-infinity');
    btn.textContent = level.name;
    btn.addEventListener('click', () => {
      currentLevelId = level.id;
      currentLevel = level;
      try { localStorage.setItem('schulte-current-level', currentLevelId); } catch (e) {}
      updateActiveLevelButton();
      showMenu();
    });
    levelGrid.appendChild(btn);
    levelButtonEls[level.id] = btn;
  });

  // Подсвечивает кнопку текущего уровня цветом --level-btn-active-color
  // (см. класс .level-tile.active в CSS), остальные — обычным цветом.
  function updateActiveLevelButton() {
    LEVELS.forEach(level => {
      levelButtonEls[level.id].classList.toggle('active', level.id === currentLevelId);
    });
  }
  updateActiveLevelButton();

  // ---------- плитки размеров таблицы + строка рекорда под каждой ----------
  // Строка рекорда (.tile-record) обычно скрыта (visibility: hidden) и
  // становится видимой только пока зажата клавиша R/К — см. updateRecordsVisibility().
  const tileRecordEls = {};
  sizes.forEach(n => {
    const wrap = document.createElement('div');
    wrap.className = 'menu-cell';

    const btn = document.createElement('button');
    btn.className = 'menu-tile';
    btn.textContent = `${n}x${n}`;
    btn.addEventListener('click', () => startGame(n));

    const rec = document.createElement('div');
    rec.className = 'tile-record';
    rec.textContent = '00:00:00';

    wrap.appendChild(btn);
    wrap.appendChild(rec);
    menuGrid.appendChild(wrap);

    tileRecordEls[n] = rec;
  });

  let currentSize = 0;
  let currentTarget = 1;
  let total = 0;
  let startTime = 0;
  let finished = false;
  let inGame = false;
  let baseSize = 0;
  let scale = 1;
  let mistakes = 0;
  let currentFontSize = 24;

  const scaleMemory = {};
  const bestMemory = {};

  function scaleKey(n) { return 'schulte-scale-' + currentLevelId + '-' + n; }
  function bestKey(n) { return 'schulte-best-' + currentLevelId + '-' + n; }

  function loadScale(n) {
    try {
      const v = localStorage.getItem(scaleKey(n));
      return v ? parseFloat(v) : 1;
    } catch (e) {
      return scaleMemory[scaleKey(n)] || 1;
    }
  }

  function saveScale(n, val) {
    try {
      localStorage.setItem(scaleKey(n), val);
    } catch (e) {
      scaleMemory[scaleKey(n)] = val;
    }
  }

  function loadBest(n) {
    try {
      const v = localStorage.getItem(bestKey(n));
      return v ? parseFloat(v) : null;
    } catch (e) {
      return bestMemory[bestKey(n)] != null ? bestMemory[bestKey(n)] : null;
    }
  }

  function saveBestIfBetter(n, ms) {
    const cur = loadBest(n);
    if (cur === null || ms < cur) {
      try {
        localStorage.setItem(bestKey(n), ms);
      } catch (e) {
        bestMemory[bestKey(n)] = ms;
      }
    }
  }

  // Соответствие физической цифровой клавиши (e.code, не зависит от раскладки)
  // размеру таблицы: Shift+2..Shift+9 -> 2..9, Shift+0 -> 10.
  const SHIFT_DIGIT_TO_SIZE = {
    Digit2: 2, Digit3: 3, Digit4: 4, Digit5: 5, Digit6: 6,
    Digit7: 7, Digit8: 8, Digit9: 9, Digit0: 10
  };

  // Сброс рекорда ОДНОЙ таблицы (размера n) ТОЛЬКО текущего уровня —
  // Shift+2..Shift+9, Shift+0 (см. обработчик keydown ниже).
  function resetLevelSizeRecord(n) {
    if (!confirm(`Сбросить рекорд таблицы ${n}x${n} уровня "${currentLevel.name}"?`)) return;
    try { localStorage.removeItem(bestKey(n)); } catch (e) {}
    delete bestMemory[bestKey(n)];
    if (recordsOn) refreshTileRecords();
  }

  function showMenu() {
    inGame = false;
    gameScreen.style.display = 'none';
    menuScreen.style.display = 'flex';
    updateEyeVisibility();
    alignCountdownToLevelGrid();
  }

  // ---------- глаз: размер и прозрачность (сохраняются, если меняли) ----------
  const EYE_DEFAULT_SIZE = 120;
  const EYE_DEFAULT_OPACITY = 1;
  let eyeSize = loadNum('schulte-eye-size', EYE_DEFAULT_SIZE);
  let eyeOpacity = loadNum('schulte-eye-opacity', EYE_DEFAULT_OPACITY);

  function loadNum(key, def) {
    try {
      const v = localStorage.getItem(key);
      return v ? parseFloat(v) : def;
    } catch (e) {
      return def;
    }
  }

  function saveNum(key, val) {
    try { localStorage.setItem(key, val); } catch (e) {}
  }

  function applyEyeStyle() {
    document.documentElement.style.setProperty('--eye-size', eyeSize + 'px');
    document.documentElement.style.setProperty('--eye-opacity', eyeOpacity);
  }
  applyEyeStyle();

  // Глаз доступен только во время прохождения таблицы (inGame), пропадает
  // на экране с итоговым таймером и снова появляется при старте/рестарте,
  // если был включён. В меню/выборе уровня глаза быть не должно.
  // Само состояние "включён/выключен" сохраняется в localStorage
  // (ключ schulte-eye-on), поэтому после перезагрузки страницы, если
  // глаз был включён, он останется включённым.
  function loadEyeOn() {
    try { return localStorage.getItem('schulte-eye-on') === 'true'; } catch (e) { return false; }
  }
  function saveEyeOn(val) {
    try { localStorage.setItem('schulte-eye-on', val ? 'true' : 'false'); } catch (e) {}
  }
  let eyeOn = loadEyeOn();

  function updateEyeVisibility() {
    if (inGame && eyeOn && !finished) {
      eyeOverlay.classList.add('show');
    } else {
      eyeOverlay.classList.remove('show');
    }
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function startGame(n) {
    currentSize = n;
    inGame = true;
    scale = loadScale(n);
    menuScreen.style.display = 'none';
    gameScreen.style.display = 'block';
    // baseSize считается ОДИН РАЗ здесь, при входе в таблицу — а не в buildGrid(),
    // чтобы он не "плавал" между разными окнами window.innerWidth/innerHeight
    // на каждом рестарте (пробел / колесо мыши вниз = следующая таблица).
    // Иначе, если размеры окна браузера чуть меняются между двумя вызовами
    // buildGrid() (например, из-за анимации перехода в полноэкранный режим
    // F11, которая доигрывает уже после того, как таблица открылась), сетка
    // визуально "прыгала" в размере сама по себе, без участия пользователя.
    baseSize = applyLayout(n);
    buildGrid(n);
  }

  function applyLayout(n) {
    let padPct = 0;
    if (topPad15.has(n)) padPct = 0.15;
    else if (topPad10.has(n)) padPct = 0.10;

    const padPx = window.innerHeight * padPct;
    const availH = window.innerHeight - padPx * 2;
    const availW = window.innerWidth * 0.96;
    const size = Math.max(0, Math.min(availH, availW));

    return size;
  }

  function resizeGrid() {
    const size = baseSize * scale;
    gridWrap.style.width = size + 'px';
    gridWrap.style.height = size + 'px';

    const cellW = (size - COL_GAP * (currentSize - 1)) / currentSize;
    const cellH = (size - ROW_GAP * (currentSize - 1)) / currentSize;
    currentFontSize = Math.min(cellW, cellH) * 0.5;
    grid.querySelectorAll('.cell').forEach(c => {
      c.style.fontSize = currentFontSize + 'px';
    });
  }

  function buildGrid(n) {
    finished = false;
    currentTarget = 1;
    mistakes = 0;
    const hasGap = oddWithGap.has(n);
    total = hasGap ? (n * n - 1) : (n * n);
    finishOverlay.classList.remove('show');
    gridWrap.style.display = '';

    // baseSize здесь больше НЕ пересчитывается (см. startGame()) — он должен
    // оставаться стабильным на протяжении всей "сессии" в этом размере/уровне,
    // независимо от того, сколько раз перегенерируется таблица (пробел,
    // колесо мыши вниз). Меняется он только явно через startGame() — то есть
    // заново при входе в размер/уровень — либо через ручной масштаб (+/-).

    const order = shuffle(Array.from({length: total}, (_, i) => i + 1));

    grid.innerHTML = '';
    grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
    grid.style.gridTemplateRows = `repeat(${n}, 1fr)`;
    grid.style.columnGap = COL_GAP + 'px';
    grid.style.rowGap = ROW_GAP + 'px';

    const centerIndex = hasGap ? Math.floor((n * n) / 2) : -1;

    let numIdx = 0;
    for (let i = 0; i < n * n; i++) {
      const cell = document.createElement('button');
      cell.style.zIndex = String(i); // нижние ряды (больше i) поверх теней верхних

      if (i === centerIndex) {
        cell.className = 'cell static-empty';
      } else {
        const ord = order[numIdx++];
        cell.className = 'cell';
        cell.textContent = currentLevel.label(ord, total);
        cell.dataset.ord = ord;
        // На уровнях с clickAnywhere (9 и 10) клик по конкретной клетке не нужен —
        // засчитывает клик где угодно на экране, см. глобальный обработчик ниже.
        if (!currentLevel.clickAnywhere) {
          cell.addEventListener('click', () => handleCellClick(cell, ord));
        }
      }
      grid.appendChild(cell);
    }

    resizeGrid();
    startTime = performance.now();
    updateEyeVisibility();
  }

  // ---------- УРОВНИ 9/10/11/12: клик в ЛЮБОЕ место ИГРОВОГО ЭКРАНА засчитывается
  // за клик по клетке с текущим искомым числом (см. флаг clickAnywhere у уровня).
  // Важно: проверяем, что клик пришёлся именно на #game-screen, а не на плитку
  // размера/уровня в меню — иначе тот же клик, которым запускается уровень,
  // сразу же засчитывал бы и первую цифру. ----------
  document.addEventListener('click', (e) => {
    if (!inGame || finished || !currentLevel.clickAnywhere) return;
    if (!gameScreen.contains(e.target)) return;
    const targetCell = grid.querySelector(`.cell[data-ord="${currentTarget}"]`);
    if (targetCell) handleCellClick(targetCell, currentTarget);
  });

  // Настройки мигания клеток для уровней с colorFeedback (сейчас — 3 и 4).
  // Цвет и прозрачность — CSS-переменные в :root (--flash-correct-color/opacity,
  // --flash-wrong-color/opacity). Длительность — тут, в миллисекундах.
  const FLASH_CORRECT_DURATION_MS = 100;
  const FLASH_WRONG_DURATION_MS = 100;

  // Общая функция мигания клетки цветом на заданную длительность (мс).
  function flashCell(cell, cls, durationMs) {
    cell.classList.remove(cls);
    void cell.offsetWidth;
    cell.classList.add(cls);
    setTimeout(() => cell.classList.remove(cls), durationMs);
  }

  // Алфавит для уровней с revealLetter (7 и 8) — заглавные русские буквы.
  const ALPHABET_RU = 'АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';
  function randomRussianLetter() {
    return ALPHABET_RU[Math.floor(Math.random() * ALPHABET_RU.length)];
  }
  // Столько случайных букв, сколько цифр было в числе (1 цифра — 1 буква, 2 цифры — 2 буквы).
  function randomRussianLetters(count) {
    let s = '';
    for (let i = 0; i < count; i++) s += randomRussianLetter();
    return s;
  }

  function handleCellClick(cell, ord) {
    if (finished || cell.classList.contains('static-empty')) return;

    if (cell.dataset.cleared === '1') {
      // Уже отвечена правильно. На обычных уровнях клетка после верного
      // ответа некликабельна (см. ниже), поэтому сюда попадаем только
      // на уровнях с colorFeedback — там повторный клик мигает красным.
      if (currentLevel.colorFeedback) flashCell(cell, 'flash-wrong', FLASH_WRONG_DURATION_MS);
      return;
    }

    if (ord !== currentTarget) {
      mistakes++;
      if (currentLevel.colorFeedback) {
        flashCell(cell, 'flash-wrong', FLASH_WRONG_DURATION_MS);
      } else {
        cell.classList.remove('shake');
        void cell.offsetWidth;
        cell.classList.add('shake');
      }
      return;
    }

    cell.dataset.cleared = '1';

    if (currentLevel.colorFeedback) {
      // Число не исчезает, клетка остаётся кликабельной специально
      // для того, чтобы повторный клик по ней мигал красным (см. выше).
      flashCell(cell, 'flash-correct', FLASH_CORRECT_DURATION_MS);
    } else if (currentLevel.revealLetter) {
      // Число заменяется случайными заглавными русскими буквами (столько же
      // букв, сколько было цифр) и остаётся видимым.
      cell.textContent = randomRussianLetters(cell.textContent.length);
      cell.style.pointerEvents = 'none';
    } else {
      cell.textContent = '';
      cell.style.pointerEvents = 'none';
    }

    currentTarget++;

    if (currentTarget > total) {
      finishGame();
    }
  }

  function formatTime(ms) {
    const totalCs = Math.floor(ms / 10);
    const cs = totalCs % 100;
    const totalSec = Math.floor(totalCs / 100);
    const sec = totalSec % 60;
    const min = Math.floor(totalSec / 60);
    const pad = v => String(v).padStart(2, '0');
    return `${pad(min)}:${pad(sec)}:${pad(cs)}`;
  }

  function finishGame() {
    const elapsed = performance.now() - startTime;
    saveBestIfBetter(currentSize, elapsed); // рекорд считается всегда, даже при instantRestart

    if (currentLevel.instantRestart) {
      // Без плашки с результатом — сразу новая таблица того же размера.
      buildGrid(currentSize);
      return;
    }

    finished = true;
    finishTime.textContent = formatTime(elapsed);
    if (currentLevel.hideErrorsLabel) {
      finishErrors.style.display = 'none';
    } else {
      finishErrors.style.display = '';
      finishErrors.textContent = 'ОШИБОК: ' + mistakes;
    }
    gridWrap.style.display = 'none';
    finishOverlay.classList.add('show');
    updateEyeVisibility();
  }

  // ---------- РЕКОРДЫ: строка под каждой плиткой, видна пока зажата R/К ----------
  let recordsOn = false;

  function refreshTileRecords() {
    sizes.forEach(n => {
      const ms = loadBest(n);
      tileRecordEls[n].textContent = ms !== null ? formatTime(ms) : '00:00:00';
    });
  }

  function updateRecordsVisibility() {
    if (recordsOn) refreshTileRecords();
    sizes.forEach(n => {
      tileRecordEls[n].classList.toggle('show', recordsOn);
    });
  }

  // ---------- ОКНО ИНФОРМАЦИИ: во весь экран, пока зажата B/И ----------
  let infoOn = false;

  function updateInfoVisibility() {
    infoOverlay.classList.toggle('show', infoOn);
  }

  // ---------- ТАЙМЕР ОБРАТНОГО ОТСЧЁТА (клавиша N, физически она же Т в русской раскладке) ----------
  // Нажал N/Т — появляется окно ввода. Пока таймер тикает — на экране ничего не видно
  // (никакой бегущей плашки с временем). Когда время вышло — на 5 секунд появляется
  // плашка "ВРЕМЯ ВЫШЛО" в том же месте, потом сама пропадает.
  // Формат ввода:
  //   "5"            -> 5 минут 0 секунд
  //   "5.20"/"5,20"  -> 5 минут 20 секунд
  //   "5.2"          -> 5 минут 2 секунды (не 5 минут 12 секунд — после точки/запятой
  //                     число читается как есть, а не как десятичная дробь)
  //   "3.61"         -> секунд (61) больше 60, поэтому они не считаются -> просто 3 минуты
  //   ".15" / ",133" -> точка/запятая БЕЗ числа перед ней — всё, что после неё, это
  //                     СЕКУНДЫ целиком (без разбивки на минуты): 15 секунд / 133 секунды
  // Enter — окно ввода закрывается, таймер стартует/перезапускается от введённого значения.
  // Повторное нажатие N/Т снова открывает окно ввода (можно ввести новое время — тогда
  // текущий отсчёт заменяется новым; можно нажать Enter на пустом поле — тогда текущий
  // отсчёт не трогается, окно просто закрывается).
  const countdownInputOverlay = document.getElementById('countdown-input-overlay');
  const countdownInputEl = document.getElementById('countdown-input');
  const countdownDisplay = document.getElementById('countdown-display');

  let countdownTimeoutId = null;      // основной таймер на всю длительность отсчёта
  let countdownExpiredHideId = null;  // скрыть плашку "ВРЕМЯ ВЫШЛО" через 5 секунд

  function parseCountdownInput(raw) {
    const s = raw.trim().replace(',', '.');
    if (!s) return null;

    if (s.startsWith('.')) {
      // Точка/запятая без числа перед ней — всё, что после, это секунды целиком.
      const totalSeconds = parseInt(s.slice(1), 10);
      if (isNaN(totalSeconds) || totalSeconds < 0) return null;
      return totalSeconds * 1000;
    }

    const parts = s.split('.');
    const minutes = parseInt(parts[0], 10);
    if (isNaN(minutes) || minutes < 0) return null;
    let seconds = 0;
    if (parts.length > 1 && parts[1] !== '') {
      const secVal = parseInt(parts[1], 10);
      if (!isNaN(secVal) && secVal >= 0 && secVal <= 60) seconds = secVal;
    }
    return minutes * 60000 + seconds * 1000;
  }

  function clearCountdownTimers() {
    if (countdownTimeoutId) { clearTimeout(countdownTimeoutId); countdownTimeoutId = null; }
    if (countdownExpiredHideId) { clearTimeout(countdownExpiredHideId); countdownExpiredHideId = null; }
  }

  function startCountdown(ms) {
    clearCountdownTimers();
    countdownDisplay.classList.remove('show', 'expired'); // пока тикает — плашка не видна
    countdownTimeoutId = setTimeout(() => {
      countdownTimeoutId = null;
      countdownDisplay.textContent = 'ВРЕМЯ ВЫШЛО';
      countdownDisplay.classList.add('show', 'expired');
      countdownExpiredHideId = setTimeout(() => {
        countdownDisplay.classList.remove('show', 'expired');
        countdownExpiredHideId = null;
      }, 5000); // <-- сколько секунд висит плашка "ВРЕМЯ ВЫШЛО"
    }, ms);
  }

  function openCountdownInput() {
    countdownInputEl.value = '';
    countdownInputOverlay.classList.add('show');
    countdownInputEl.focus();
  }

  countdownInputEl.addEventListener('keydown', (e) => {
    // Не даём нажатиям внутри поля ввода долетать до общих хоткеев приложения (R/К, U/Г и т.д.).
    e.stopPropagation();
    if (e.key === 'Enter') {
      e.preventDefault();
      const ms = parseCountdownInput(countdownInputEl.value);
      if (ms !== null) startCountdown(ms);
      countdownInputOverlay.classList.remove('show');
    }
  });

  // Выравнивание правого края окна таймера по правому краю кнопок "∞" (столбик уровней) —
  // все инфинити-кнопки в одной колонке одной ширины, поэтому достаточно измерить любую.
  // Пересчитывается при показе меню размеров и при изменении размера окна браузера.
  function alignCountdownToLevelGrid() {
    const anchorBtn = levelButtonEls['level2'];
    if (!anchorBtn) return;
    const rect = anchorBtn.getBoundingClientRect();
    if (rect.width === 0 && rect.height === 0) return; // сейчас не отображается — не трогаем
    const offset = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--countdown-right-offset')) || 0;
    const rightPx = Math.round(window.innerWidth - rect.right + offset);
    countdownInputOverlay.style.left = 'auto';
    countdownInputOverlay.style.right = rightPx + 'px';
    countdownDisplay.style.left = 'auto';
    countdownDisplay.style.right = rightPx + 'px';
  }

  window.addEventListener('resize', () => {
    if (menuScreen.style.display !== 'none') alignCountdownToLevelGrid();
  });

  // ---------- клавиатура ----------
  document.addEventListener('keydown', (e) => {
    // Shift+2..Shift+9, Shift+0 — сброс рекорда ОДНОЙ таблицы (2х2..9х9, 10х10)
    // ТОЛЬКО текущего уровня (с подтверждением). Ctrl не нужен и не проверяется.
    if (e.shiftKey && SHIFT_DIGIT_TO_SIZE[e.code] !== undefined) {
      e.preventDefault();
      resetLevelSizeRecord(SHIFT_DIGIT_TO_SIZE[e.code]);
      return;
    }

    if (e.code === 'KeyR') { // R (англ.) / К (рус.) — показать рекорды под плитками, пока зажата
      e.preventDefault();
      if (!recordsOn) {
        recordsOn = true;
        updateRecordsVisibility();
      }
    }

    if (e.code === 'KeyB') { // B (англ.) / И (рус.) — окно информации на весь экран, пока зажата
      e.preventDefault();
      if (!infoOn) {
        infoOn = true;
        updateInfoVisibility();
      }
    }

    if (e.code === 'KeyN') { // N (англ.) / Т (рус.) — окно ввода таймера обратного отсчёта
      e.preventDefault();
      openCountdownInput();
    }

    if (inGame) {
      if (e.code === 'KeyU') { // U (англ.) / Г (рус.) — вкл/выкл глаз (только во время игры)
        e.preventDefault();
        eyeOn = !eyeOn;
        saveEyeOn(eyeOn);
        updateEyeVisibility();
      }
      if (e.code === 'KeyK') { // K (англ.) / Л (рус.) — уменьшить прозрачность глаза (мин 10%)
        e.preventDefault();
        eyeOpacity = Math.max(0.1, +(eyeOpacity - 0.1).toFixed(2));
        saveNum('schulte-eye-opacity', eyeOpacity);
        applyEyeStyle();
      }
      if (e.code === 'KeyL') { // L (англ.) / Д (рус.) — увеличить прозрачность глаза (макс 100%)
        e.preventDefault();
        eyeOpacity = Math.min(1, +(eyeOpacity + 0.1).toFixed(2));
        saveNum('schulte-eye-opacity', eyeOpacity);
        applyEyeStyle();
      }
      if (e.code === 'KeyP') { // P (англ.) / З (рус.) — увеличить размер глаза
        e.preventDefault();
        eyeSize += 10;
        saveNum('schulte-eye-size', eyeSize);
        applyEyeStyle();
      }
      if (e.code === 'KeyO') { // O (англ.) / Щ (рус.) — уменьшить размер глаза
        e.preventDefault();
        eyeSize = Math.max(20, eyeSize - 10);
        saveNum('schulte-eye-size', eyeSize);
        applyEyeStyle();
      }
    }

    if (!inGame) return;

    if (e.code === 'Space') {
      e.preventDefault();
      buildGrid(currentSize);
      return;
    }
    if (e.code === 'Escape') {
      e.preventDefault();
      showMenu();
      return;
    }
    if (e.key === '+' || e.key === '=' || e.code === 'NumpadAdd') {
      e.preventDefault();
      scale = +(scale + 0.1).toFixed(2);
      saveScale(currentSize, scale);
      resizeGrid();
      return;
    }
    if (e.key === '-' || e.code === 'NumpadSubtract') {
      e.preventDefault();
      scale = Math.max(0.2, +(scale - 0.1).toFixed(2));
      saveScale(currentSize, scale);
      resizeGrid();
      return;
    }
  });

  document.addEventListener('keyup', (e) => {
    if (e.code === 'KeyR') { // отпустили R/К — прячем рекорды под плитками
      recordsOn = false;
      updateRecordsVisibility();
    }
    if (e.code === 'KeyB') { // отпустили B/И — прячем окно информации
      infoOn = false;
      updateInfoVisibility();
    }
  });

  // ---------- средняя кнопка мыши: подсказка нужной цифры ----------
  document.addEventListener('mousedown', (e) => {
    if (e.button === 1) {
      e.preventDefault();
      if (inGame && !finished) {
        peekOverlay.textContent = currentLevel.label(currentTarget, total);
        peekOverlay.style.fontSize = currentFontSize + 'px';
        peekOverlay.classList.add('show');
      }
    }
  });

  document.addEventListener('mouseup', (e) => {
    if (e.button === 1) {
      peekOverlay.classList.remove('show');
    }
  });

  document.addEventListener('auxclick', (e) => {
    if (e.button === 1) e.preventDefault();
  });

  // ---------- колесо мыши: навигация ----------
  document.addEventListener('wheel', (e) => {
    if (inGame) {
      if (e.deltaY > 0) {
        buildGrid(currentSize);
      } else if (e.deltaY < 0) {
        showMenu();
      }
    }
  }, { passive: true });

  showMenu();
</script>

</body>
</html>
