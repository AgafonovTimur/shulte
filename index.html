<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таблицы Шульте</title>

<!--
=====================================================================
ДОКУМЕНТАЦИЯ — ТАБЛИЦЫ ШУЛЬТЕ
Один файл index.html, без бэкенда. Подходит для GitHub Pages:
просто положить файл в репозиторий и включить Pages для ветки.
=====================================================================

ЦВЕТА И ШРИФТ
- :root { --tile-text: #8e8e8e; } — цвет текста на всех плитках,
  таймерах под плитками и иконке глаза (через --eye-color).
- Шрифт — PT Sans Bold, подключён через Google Fonts в <head>.

ГЛАВНОЕ МЕНЮ (выбор размера таблицы)
- .menu-grid { gap; width; max-width } — отступы между плитками
  и общая ширина блока меню.
- Раскладка плиток 2/5/8, 3/6/9, 4/7/10 задаётся через
  grid-auto-flow: column в .menu-grid (убрать строку — вернётся
  обычный построчный порядок 2,3,4 / 5,6,7 / 8,9,10).
- .menu-tile { font-size; aspect-ratio } — размер текста "NxN"
  и пропорции плитки.
- Под каждой плиткой — строка с рекордом (см. раздел "РЕКОРДЫ").

РЕКОРДЫ (клавиша R, физически она же К в русской раскладке)
- Никакой отдельной плашки/окна — просто текст под каждой плиткой
  размера (.tile-record), обычно невидимый (visibility: hidden,
  место зарезервировано, чтобы плитки не прыгали). Пока зажата
  R/К — текст становится видимым и показывает лучшее время по
  этому размеру для текущего уровня (или 00:00:00, если рекорда
  ещё нет). Отпустили клавишу — текст снова скрыт.
  Ключи в localStorage не изменились: schulte-best-<level>-<size>.
- Внешний вид — в :root: --records-font-size, --records-gap
  (отступ от плитки до строки рекорда), --records-color.
- Ctrl+Shift+R — сбросить рекорды ТОЛЬКО текущего уровня (по всем
  его размерам, с подтверждением через confirm()). Другие уровни
  не затрагиваются.

ОКНО ИНФОРМАЦИИ (клавиша I, физически она же Ш в русской раскладке)
- Пока зажата I/Ш — во весь экран (поверх всего интерфейса)
  показывается окно #info-overlay размером 600×800px (ширина×высота)
  с текстом внутри (#info-box). Работает на любом экране. Отпустили
  клавишу — окно пропадает, всё, что было на экране до этого,
  видно как прежде (само содержимое остальных экранов никуда
  не девалось, оно просто было перекрыто окном информации).
- Содержимое пока заглушка ("123"), меняется в разметке
  #info-box в <body>.

ТАБЛИЦА В ИГРЕ
- COL_GAP / SHADOW_OFFSET (в начале <script>) — боковой зазор
  между плитками и высота "тени". Вертикальный зазор всегда
  считается как SHADOW_OFFSET + COL_GAP, чтобы расстояние от низа
  тени до следующей плитки было равно боковому зазору.
- @keyframes shake-x — амплитуда тряски при неверном клике (px).
  Используется только для уровней БЕЗ colorFeedback (см. УРОВНИ).
- Для уровней с colorFeedback (по умолчанию — 3 и 4) вместо тряски
  клетка на 0.1с красится в зелёный/красный: --flash-correct-color
  (#b3ffb3 @ 50%), --flash-wrong-color (#ffcccc @ 50%) в :root.
  Число при верном ответе не пропадает, клетка остаётся кликабельной —
  повторный клик по уже отвеченной клетке мигает красным.
- Масштаб всей таблицы: клавиши + / − (зум из центра экрана),
  шаг 0.1, без верхнего предела, нижний предел 0.2. Сохраняется
  в localStorage отдельно для каждого размера и уровня.

ФИНАЛЬНАЯ ПЛАШКА (после прохождения таблицы)
- #finish-overlay { padding } — размер самой плашки.
- #finish-time { font-size } — размер шрифта времени.
- #finish-errors { font-size } — размер строки "ОШИБОК: N"
  (считается каждый неверный клик за попытку, сбрасывается
  при каждом новом запуске/рестарте).
- Для уровней с instantRestart (по умолчанию — 2 и 4) эта плашка
  вообще не показывается: сразу стартует новая таблица того же
  размера, а рекорд всё равно сохраняется в фоне (см. УРОВНИ).

ГЛАЗ (клавиша U, физически она же Г в русской раскладке)
- Работает только во время прохождения таблицы. На экранах
  меню/выбора уровня глаза нет. Если глаз был включён и игрок
  дошёл до конца — на экране с итоговым временем глаз прячется,
  а при следующем запуске/рестарте таблицы появляется снова
  (если не выключить).
- Размер меняется клавишами P/З (+10px) и O/Щ (-10px).
- Прозрачность меняется клавишами L/Д (+10%, до 100%)
  и K/Л (-10%, до минимума 10%).
- Оба параметра сохраняются в localStorage, но только если
  отличаются от стандартных (120px и 100%).
- Картинка глаза встроена в файл как base64 и перекрашивается
  через CSS mask-image, поэтому меняется через --eye-color.

СРЕДНЯЯ КНОПКА МЫШИ
- Зажата — в центре экрана показывается следующая нужная
  цифра/буква тем же шрифтом, что и в таблице. Отжата — пропадает.
- Цвет подсказки — :root: --peek-color (сейчас красный).

НАВИГАЦИЯ
- Esc или прокрутка колеса вверх — выйти из таблицы в меню
  размеров; из меню размеров прокрутка вверх — на экран уровней.
- Space или прокрутка колеса вниз — рестарт текущей таблицы
  (новое расположение, таймер и счётчик ошибок с нуля).

УРОВНИ
- Массив LEVELS в начале <script> — по умолчанию 12 уровней
  (id level1..level12, названия "1".."12"), у каждого — полный
  набор размеров 2x2..10x10, как раньше. Рекорды и масштаб
  хранятся отдельно по id, поэтому уровни независимы друг
  от друга. Чтобы поменять название/логику плитки — правьте
  поля name / label(order, total) прямо в массиве.
- Кнопки уровней — сетка по 2 в ряд (1-2, 3-4 ... 11-12) слева
  внутри #menu-screen, показываются на любом уровне вместе
  с плитками размеров (не отдельный экран). Мышью не двигаются,
  положение/размер/зазор — только в CSS (:root: --level-btn-size,
  --level-btn-font-size, --level-btn-gap, а также gap у
  #menu-screen — расстояние между столбиком уровней и плитками
  размеров).
- Кнопка ВЫБРАННОГО сейчас уровня подсвечивается — текст становится
  ярче (--level-btn-active-color в :root, класс .level-tile.active
  в CSS), у остальных кнопок обычный цвет (--tile-text).

ХРАНЕНИЕ ДАННЫХ
- Все настройки (масштаб, рекорды, размер/прозрачность глаза)
  хранятся в localStorage браузера — то есть на конкретном
  устройстве/браузере, без сервера. На другом устройстве или
  в другом браузере будут значения по умолчанию.
===================================================================== -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a1a;
    --tile: #5a5a5a;
    --tile-text: #8e8e8e;   /* <-- цвет цифр/текста на плитках меняется здесь */
    --shadow-color: #303030;

    /* ---- иконка "глаз" (показывается по клавише U/Г, только во время игры) ---- */
    --eye-size: 120px;             /* <-- размер иконки глаза (меняется клавишами P/З и O/Щ) */
    --eye-color: var(--tile-text); /* <-- цвет иконки глаза */
    --eye-opacity: 1;              /* <-- прозрачность глаза (меняется клавишами L/Д и K/Л) */

    /* ---- слой РЕКОРДЫ (текст под плиткой размера, виден пока зажата R/К) ---- */
    --records-color: var(--tile-text);   /* <-- цвет текста рекорда */
    --records-font-size: 22px;           /* <-- размер шрифта строки рекорда */
    --records-gap: 12px;                 /* <-- отступ от плитки до строки рекорда */

    /* ---- кнопки уровней (вертикальный столбик, левый край главного экрана) ---- */
    --level-btn-size: 60px;      /* <-- сторона квадратной кнопки уровня */
    --level-btn-font-size: 22px; /* <-- размер цифры на кнопке уровня */
    --level-btn-gap: 16px;       /* <-- расстояние между кнопками уровней */
    --level-btn-active-color: #e4e4e4; /* <-- цвет текста ВЫБРАННОГО сейчас уровня (ярче обычного) */

    /* ---- окно информации (клавиша I/Ш) ---- */
    --info-font-size: 40px;      /* <-- размер шрифта текста в окне информации */

    /* ---- подсказка по средней кнопке мыши ---- */
    --peek-color: #e5484d;       /* <-- цвет подсказки (сейчас красный), меняется тут */

    /* ---- подсветка клетки при верном/неверном ответе (уровни с colorFeedback) ----
       Цвет и прозрачность — раздельные переменные (CSS ниже собирает их через
       color-mix). Длительность мигания в мс — JS-константы FLASH_CORRECT_DURATION_MS
       и FLASH_WRONG_DURATION_MS в начале <script> (ищи "Настройки мигания клеток"). */
    --flash-correct-color: #b3ffb3;   /* <-- цвет плашки при верном ответе */
    --flash-correct-opacity: 50%;     /* <-- прозрачность плашки при верном ответе */
    --flash-wrong-color: #ffcccc;     /* <-- цвет плашки при неверном ответе */
    --flash-wrong-opacity: 50%;       /* <-- прозрачность плашки при неверном ответе */
  }


  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: #ddd;
    font-family: 'PT Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100%;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  /* ---------- LEVEL SELECT ----------
     Вертикальный столбик кнопок уровней (по умолчанию 10, "1".."10").
     Теперь это не отдельный экран, а левая колонка внутри #menu-screen —
     кнопки уровней видны вместе с плитками размеров на любом уровне.
     Положение — только через CSS ниже (gap/padding у #menu-screen).
     Кнопки НЕ двигаются мышью — только правкой настроек тут
     и данных в массиве LEVELS. */

  .level-grid {
    display: grid;
    grid-template-columns: repeat(2, var(--level-btn-size)); /* <-- 2 кнопки в ряд (1-2, 3-4 ... 11-12) */
    gap: var(--level-btn-gap);
    flex-shrink: 0;
  }

  .level-tile {
    background: var(--tile);
    border: none;
    border-radius: 12px;
    color: var(--tile-text);
    font-family: 'PT Sans', sans-serif;
    font-size: var(--level-btn-font-size);
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--shadow-color);
    width: var(--level-btn-size);
    height: var(--level-btn-size);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .level-tile:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--shadow-color);
  }

  /* Кнопка выбранного сейчас уровня — текст чуть ярче остальных.
     Цвет вынесен в отдельную переменную, чтобы менять его отдельно
     от обычного цвета текста кнопок уровней (--tile-text). */
  .level-tile.active {
    color: var(--level-btn-active-color);
  }

  /* ---------- MENU (выбор размера таблицы) ---------- */

  #menu-screen {
    display: none;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 6vw;                   /* <-- расстояние между столбиком уровней и плитками размеров */
    width: 100%;
    height: 100%;
    padding: 20vh 24px;
    position: relative;
  }

  /* Размер сетки меню: ширина блока с кнопками задаётся здесь (width / max-width).
     Чтобы изменить расстояние между плитками — меняйте значение gap ниже (статичное, в px).
     grid-auto-flow: column + порядок плиток 2..10 в разметке даёт раскладку:
     2 5 8
     3 6 9
     4 7 10 */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    grid-auto-flow: column;
    gap: 100px;                 /* <-- расстояние между плитками меню (одинаковое по X и Y) */
    width: 70%;                /* <-- общая ширина блока меню */
    max-width: 1080px;          /* <-- ограничение максимальной ширины блока меню */
  }

  /* Размер/форма каждой плитки меню: aspect-ratio задаёт соотношение сторон,
     font-size — размер текста "NxN" — увеличивай/уменьшай это значение. */
  .menu-tile {
    background: var(--tile);
    border: none;
    border-radius: 14px;
    color: var(--tile-text);
    font-family: 'PT Sans', sans-serif;
    font-size: 48px;           /* <-- РАЗМЕР ТЕКСТА НА ПЛИТКАХ ГЛАВНОГО МЕНЮ (меняй тут) */
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--shadow-color);
    aspect-ratio: 2 / 1;       /* <-- соотношение сторон плитки (ширина / высота) */
    width: 100%;
  }

  .menu-tile:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--shadow-color);
  }

  /* Обёртка вокруг плитки размера — стоит в сетке .menu-grid.
     Внутри неё же — строка рекорда (.tile-record), обычно скрытая
     (visibility: hidden — место зарезервировано, чтобы плитки не
     прыгали), видимая только пока зажата клавиша R/К. */
  .menu-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .tile-record {
    margin-top: var(--records-gap);   /* <-- отступ от плитки до строки рекорда */
    font-family: 'PT Sans', sans-serif;
    font-weight: 700;
    font-size: var(--records-font-size); /* <-- размер шрифта рекорда */
    color: var(--records-color);         /* <-- цвет текста рекорда */
    font-variant-numeric: tabular-nums;
    visibility: hidden;                  /* <-- по умолчанию скрыт, но место занимает */
  }

  .tile-record.show {
    visibility: visible;
  }

  /* ---------- GAME ---------- */

  #game-screen {
    display: none;
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* Сетка позиционируется абсолютно и центрируется относительно центра экрана,
     поэтому при изменении масштаба (+/-) она растёт/уменьшается именно из центра. */
  #grid-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  #grid {
    display: grid;
    width: 100%;
    height: 100%;
  }

  .cell {
    background: var(--tile);
    color: var(--tile-text);
    font-family: 'PT Sans', sans-serif;
    border: none;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 6px 0 var(--shadow-color);
    position: relative; /* нужно, чтобы z-index ниже работал предсказуемо */
  }

  .cell.static-empty {
    cursor: default;
  }

  /* Амплитуда тряски при неверном клике — меняйте px-значения ниже. */
  @keyframes shake-x {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-3px); }
    40%  { transform: translateX(3px); }
    60%  { transform: translateX(-2px); }
    80%  { transform: translateX(2px); }
    100% { transform: translateX(0); }
  }

  .cell.shake {
    animation: shake-x 0.3s ease;
  }

  /* Подсветка клетки для уровней с colorFeedback (сейчас — 3 и 4):
     верный ответ — зелёным на 0.3с, неверный — красным на 0.3с,
     без тряски вбок (класс .shake для таких уровней не используется). */
  .cell.flash-correct {
    background: color-mix(in srgb, var(--flash-correct-color) var(--flash-correct-opacity), transparent);
  }

  .cell.flash-wrong {
    background: color-mix(in srgb, var(--flash-wrong-color) var(--flash-wrong-opacity), transparent);
  }

  /* ---------- PEEK (средняя кнопка мыши — показать искомую цифру) ---------- */

  #peek-overlay {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--peek-color);  /* <-- цвет подсказки по средней кнопке мыши */
    font-family: 'PT Sans', sans-serif;
    font-weight: 700;
    pointer-events: none;
    z-index: 1000;
  }

  #peek-overlay.show { display: block; }

  /* ---------- EYE (клавиша U/Г) ----------
     Иконка глаза — картинка, перекрашиваемая через mask-image:
     цвет задаёт --eye-color, прозрачность — --eye-opacity,
     размер — --eye-size (объявлены в :root выше). */

  #eye-overlay {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: var(--eye-size);

  #eye-overlay.show { display: block; }

  /* ---------- FINISH PLATE ---------- */

  /* Чтобы увеличить плашку с результатом — меняй padding ниже.
     Чтобы увеличить шрифт времени — меняй font-size в #finish-time. */
  #finish-overlay {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--tile);
    border-radius: 14px;
    box-shadow: 0 6px 0 var(--shadow-color);
    padding: 26px 44px;        /* <-- РАЗМЕР ОКНА С ТАЙМЕРОМ (увеличить — увеличить padding) */
    text-align: center;
  }

  #finish-overlay.show {
    display: block;
  }

  #finish-time {
    font-family: 'PT Sans', sans-serif;
    font-size: 51px;           /* <-- РАЗМЕР ШРИФТА ИТОГОВОГО ТАЙМЕРА */
    font-weight: 700;
    color: var(--tile-text);
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  #finish-errors {
    margin-top: 10px;
    font-family: 'PT Sans', sans-serif;
    font-size: 24px;           /* <-- размер строки "Ошибок: N" (увеличено на 20%) */
    font-weight: 700;
    color: var(--tile-text);
    opacity: 0.85;
  }

  /* ---------- ОКНО ИНФОРМАЦИИ (клавиша I/Ш, во весь экран, 600×800) ----------
     Пока зажата I/Ш — перекрывает собой весь остальной интерфейс.
     Отпустили клавишу — окно прячется, всё, что было под ним,
     видно как прежде (оно никуда не девалось, просто было закрыто). */

  #info-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);      /* <-- перекрывает интерфейс полностью */
    align-items: center;
    justify-content: center;
    z-index: 5000;
  }

  #info-overlay.show { display: flex; }

  #info-box {
    width: 600px;                /* <-- ширина окна информации */
    height: 800px;                /* <-- высота окна информации */
    max-width: 96vw;
    max-height: 96vh;
    background: var(--tile);
    border-radius: 14px;
    box-shadow: 0 6px 0 var(--shadow-color);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
    color: var(--tile-text);
    font-family: 'PT Sans', sans-serif;
    font-weight: 700;
    font-size: var(--info-font-size); /* <-- размер шрифта текста внутри окна */
  }
</style>
</head>
<body>

<div id="app">

  <div id="menu-screen">
    <div class="level-grid" id="level-grid"></div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <div id="game-screen">
    <div id="grid-wrap">
      <div id="grid"></div>
    </div>
    <div id="finish-overlay">
      <div id="finish-time"></div>
      <div id="finish-errors"></div>
    </div>
  </div>

  <div id="peek-overlay"></div>

  <div id="eye-overlay"></div>

  <div id="info-overlay">
    <div id="info-box">123</div>
  </div>

</div>

<script>
  /* =========================================================
     УРОВНИ
     По умолчанию 12 уровней (id level1..level12), у каждого —
     полный набор размеров 2x2..10x10, как в обычном меню.
     Рекорды и масштаб хранятся отдельно по id, так что уровни
     не мешают друг другу. Чтобы поменять название кнопки или
     то, что показывается на плитке вместо числа — правьте
     name / label(order, total) прямо здесь.

     У каждого уровня четыре флага-модификатора поведения игры:
     - instantRestart: true — после прохождения таблицы плашка
       с временем/ошибками НЕ показывается, сразу стартует новая
       таблица того же размера. Рекорд при этом всё равно
       сохраняется и виден в меню по удержанию R/К, как обычно.
     - colorFeedback: true — при верном ответе клетка на
       FLASH_CORRECT_DURATION_MS красится в --flash-correct-color
       (с прозрачностью --flash-correct-opacity), при неверном —
       на FLASH_WRONG_DURATION_MS в --flash-wrong-color (с
       --flash-wrong-opacity) БЕЗ тряски вбок; число на клетке при
       верном ответе не исчезает, клетка остаётся кликабельной —
       повторный клик по уже отвеченной клетке тоже мигает красным.
       Цвета/прозрачность — в :root, длительности — JS-константы
       FLASH_CORRECT_DURATION_MS / FLASH_WRONG_DURATION_MS (ищи
       "Настройки мигания клеток" в <script>).
     - revealLetter: true — при верном ответе число заменяется
       случайной заглавной русской буквой (ALPHABET_RU в <script>)
       вместо исчезновения.
     - clickAnywhere: true — клик по конкретной клетке не нужен,
       засчитывается клик в ЛЮБОЕ место экрана (см. глобальный
       обработчик click рядом с buildGrid).
     Включены: 2 — instantRestart; 3 — colorFeedback; 4 — оба;
     5/6 — трёхзначные числа на всех размерах (переопределён label),
     6 вдобавок с instantRestart; 7/8 — revealLetter, 8 вдобавок
     с instantRestart; 9/10 — clickAnywhere, 10 вдобавок с
     instantRestart; 11/12 — clickAnywhere + colorFeedback (клик
     где угодно на экране + зелёная подсветка верной клетки теми же
     параметрами цвета/прозрачности/длительности, что и у 3/4),
     12 вдобавок с instantRestart. Правьте/добавляйте по этому же
     принципу.
     ========================================================= */
  const LEVELS = [];
  for (let i = 1; i <= 12; i++) {
    LEVELS.push({
      id: 'level' + i,
      name: String(i),
      label: (order, total) => String(order).padStart(total <= 9 ? 1 : 2, '0'),
      instantRestart: false,
      colorFeedback: false,
      revealLetter: false,
      clickAnywhere: false
    });
  }
  LEVELS[1].instantRestart = true;                       // уровень 2
  LEVELS[2].colorFeedback = true;                         // уровень 3
  LEVELS[3].instantRestart = true;                        // уровень 4
  LEVELS[3].colorFeedback = true;                         // уровень 4
  LEVELS[4].label = (order) => String(order).padStart(3, '0'); // уровень 5 — трёхзначные числа
  LEVELS[5].label = (order) => String(order).padStart(3, '0'); // уровень 6 — трёхзначные числа
  LEVELS[5].instantRestart = true;                        // уровень 6
  LEVELS[6].revealLetter = true;                          // уровень 7 — верный ответ превращается в букву
  LEVELS[7].revealLetter = true;                          // уровень 8 — то же + мгновенный рестарт
  LEVELS[7].instantRestart = true;                        // уровень 8
  LEVELS[8].clickAnywhere = true;                         // уровень 9 — клик где угодно на экране
  LEVELS[9].clickAnywhere = true;                         // уровень 10 — то же + мгновенный рестарт
  LEVELS[9].instantRestart = true;                        // уровень 10
  LEVELS[10].clickAnywhere = true;                        // уровень 11 — клик где угодно + зелёная подсветка
  LEVELS[10].colorFeedback = true;                        // уровень 11
  LEVELS[11].clickAnywhere = true;                        // уровень 12 — то же + мгновенный рестарт
  LEVELS[11].colorFeedback = true;                        // уровень 12
  LEVELS[11].instantRestart = true;                       // уровень 12

  const levelGrid = document.getElementById('level-grid');
  const menuGrid = document.getElementById('menu-grid');
  const menuScreen = document.getElementById('menu-screen');
  const gameScreen = document.getElementById('game-screen');
  const grid = document.getElementById('grid');
  const gridWrap = document.getElementById('grid-wrap');
  const finishOverlay = document.getElementById('finish-overlay');
  const finishTime = document.getElementById('finish-time');
  const finishErrors = document.getElementById('finish-errors');
  const peekOverlay = document.getElementById('peek-overlay');
  const eyeOverlay = document.getElementById('eye-overlay');
  const infoOverlay = document.getElementById('info-overlay');

  const sizes = [2,3,4,5,6,7,8,9,10];
  const oddWithGap = new Set([5,7,9]);
  const topPad15 = new Set([2,3,4,5]);
  const topPad10 = new Set([6,7]);

  // Расстояние между плитками внутри таблицы:
  // COL_GAP — зазор по бокам (между соседями в строке).
  // ROW_GAP — зазор по вертикали = высота тени + COL_GAP.
  const COL_GAP = 2;
  const SHADOW_OFFSET = 6;
  const ROW_GAP = SHADOW_OFFSET + COL_GAP;

  let currentLevelId = LEVELS[0].id;
  let currentLevel = LEVELS[0];

  // ---------- уровни ----------
  const levelButtonEls = {};
  LEVELS.forEach(level => {
    const btn = document.createElement('button');
    btn.className = 'level-tile';
    btn.textContent = level.name;
    btn.addEventListener('click', () => {
      currentLevelId = level.id;
      currentLevel = level;
      updateActiveLevelButton();
      showMenu();
    });
    levelGrid.appendChild(btn);
    levelButtonEls[level.id] = btn;
  });

  // Подсвечивает кнопку текущего уровня цветом --level-btn-active-color
  // (см. класс .level-tile.active в CSS), остальные — обычным цветом.
  function updateActiveLevelButton() {
    LEVELS.forEach(level => {
      levelButtonEls[level.id].classList.toggle('active', level.id === currentLevelId);
    });
  }
  updateActiveLevelButton();

  // ---------- плитки размеров таблицы + строка рекорда под каждой ----------
  // Строка рекорда (.tile-record) обычно скрыта (visibility: hidden) и
  // становится видимой только пока зажата клавиша R/К — см. updateRecordsVisibility().
  const tileRecordEls = {};
  sizes.forEach(n => {
    const wrap = document.createElement('div');
    wrap.className = 'menu-cell';

    const btn = document.createElement('button');
    btn.className = 'menu-tile';
    btn.textContent = `${n}x${n}`;
    btn.addEventListener('click', () => startGame(n));

    const rec = document.createElement('div');
    rec.className = 'tile-record';
    rec.textContent = '00:00:00';

    wrap.appendChild(btn);
    wrap.appendChild(rec);
    menuGrid.appendChild(wrap);

    tileRecordEls[n] = rec;
  });

  let currentSize = 0;
  let currentTarget = 1;
  let total = 0;
  let startTime = 0;
  let finished = false;
  let inGame = false;
  let baseSize = 0;
  let scale = 1;
  let mistakes = 0;
  let currentFontSize = 24;

  const scaleMemory = {};
  const bestMemory = {};

  function scaleKey(n) { return 'schulte-scale-' + currentLevelId + '-' + n; }
  function bestKey(n) { return 'schulte-best-' + currentLevelId + '-' + n; }

  function loadScale(n) {
    try {
      const v = localStorage.getItem(scaleKey(n));
      return v ? parseFloat(v) : 1;
    } catch (e) {
      return scaleMemory[scaleKey(n)] || 1;
    }
  }

  function saveScale(n, val) {
    try {
      localStorage.setItem(scaleKey(n), val);
    } catch (e) {
      scaleMemory[scaleKey(n)] = val;
    }
  }

  function loadBest(n) {
    try {
      const v = localStorage.getItem(bestKey(n));
      return v ? parseFloat(v) : null;
    } catch (e) {
      return bestMemory[bestKey(n)] != null ? bestMemory[bestKey(n)] : null;
    }
  }

  function saveBestIfBetter(n, ms) {
    const cur = loadBest(n);
    if (cur === null || ms < cur) {
      try {
        localStorage.setItem(bestKey(n), ms);
      } catch (e) {
        bestMemory[bestKey(n)] = ms;
      }
    }
  }

  // Сброс рекордов ТОЛЬКО текущего уровня (по всем его размерам) — Ctrl+Shift+R.
  function resetCurrentLevelRecords() {
    if (!confirm(`Сбросить все рекорды уровня "${currentLevel.name}"?`)) return;
    sizes.forEach(n => {
      try { localStorage.removeItem(bestKey(n)); } catch (e) {}
      delete bestMemory[bestKey(n)];
    });
    if (recordsOn) refreshTileRecords();
  }

  function showMenu() {
    inGame = false;
    gameScreen.style.display = 'none';
    menuScreen.style.display = 'flex';
    updateEyeVisibility();
  }

  // ---------- глаз: размер и прозрачность (сохраняются, если меняли) ----------
  const EYE_DEFAULT_SIZE = 120;
  const EYE_DEFAULT_OPACITY = 1;
  let eyeSize = loadNum('schulte-eye-size', EYE_DEFAULT_SIZE);
  let eyeOpacity = loadNum('schulte-eye-opacity', EYE_DEFAULT_OPACITY);

  function loadNum(key, def) {
    try {
      const v = localStorage.getItem(key);
      return v ? parseFloat(v) : def;
    } catch (e) {
      return def;
    }
  }

  function saveNum(key, val) {
    try { localStorage.setItem(key, val); } catch (e) {}
  }

  function applyEyeStyle() {
    document.documentElement.style.setProperty('--eye-size', eyeSize + 'px');
    document.documentElement.style.setProperty('--eye-opacity', eyeOpacity);
  }
  applyEyeStyle();

  // Глаз доступен только во время прохождения таблицы (inGame), пропадает
  // на экране с итоговым таймером и снова появляется при старте/рестарте,
  // если был включён. В меню/выборе уровня глаза быть не должно.
  let eyeOn = false;

  function updateEyeVisibility() {
    if (inGame && eyeOn && !finished) {
      eyeOverlay.classList.add('show');
    } else {
      eyeOverlay.classList.remove('show');
    }
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function startGame(n) {
    currentSize = n;
    inGame = true;
    scale = loadScale(n);
    menuScreen.style.display = 'none';
    gameScreen.style.display = 'block';
    buildGrid(n);
  }

  function applyLayout(n) {
    let padPct = 0;
    if (topPad15.has(n)) padPct = 0.15;
    else if (topPad10.has(n)) padPct = 0.10;

    const padPx = window.innerHeight * padPct;
    const availH = window.innerHeight - padPx * 2;
    const availW = window.innerWidth * 0.96;
    const size = Math.max(0, Math.min(availH, availW));

    return size;
  }

  function resizeGrid() {
    const size = baseSize * scale;
    gridWrap.style.width = size + 'px';
    gridWrap.style.height = size + 'px';

    const cellW = (size - COL_GAP * (currentSize - 1)) / currentSize;
    const cellH = (size - ROW_GAP * (currentSize - 1)) / currentSize;
    currentFontSize = Math.min(cellW, cellH) * 0.5;
    grid.querySelectorAll('.cell').forEach(c => {
      c.style.fontSize = currentFontSize + 'px';
    });
  }

  function buildGrid(n) {
    finished = false;
    currentTarget = 1;
    mistakes = 0;
    const hasGap = oddWithGap.has(n);
    total = hasGap ? (n * n - 1) : (n * n);
    finishOverlay.classList.remove('show');
    gridWrap.style.display = '';

    baseSize = applyLayout(n);

    const order = shuffle(Array.from({length: total}, (_, i) => i + 1));

    grid.innerHTML = '';
    grid.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
    grid.style.gridTemplateRows = `repeat(${n}, 1fr)`;
    grid.style.columnGap = COL_GAP + 'px';
    grid.style.rowGap = ROW_GAP + 'px';

    const centerIndex = hasGap ? Math.floor((n * n) / 2) : -1;

    let numIdx = 0;
    for (let i = 0; i < n * n; i++) {
      const cell = document.createElement('button');
      cell.style.zIndex = String(i); // нижние ряды (больше i) поверх теней верхних

      if (i === centerIndex) {
        cell.className = 'cell static-empty';
      } else {
        const ord = order[numIdx++];
        cell.className = 'cell';
        cell.textContent = currentLevel.label(ord, total);
        cell.dataset.ord = ord;
        // На уровнях с clickAnywhere (9 и 10) клик по конкретной клетке не нужен —
        // засчитывает клик где угодно на экране, см. глобальный обработчик ниже.
        if (!currentLevel.clickAnywhere) {
          cell.addEventListener('click', () => handleCellClick(cell, ord));
        }
      }
      grid.appendChild(cell);
    }

    resizeGrid();
    startTime = performance.now();
    updateEyeVisibility();
  }

  // ---------- УРОВНИ 9/10/11/12: клик в ЛЮБОЕ место ИГРОВОГО ЭКРАНА засчитывается
  // за клик по клетке с текущим искомым числом (см. флаг clickAnywhere у уровня).
  // Важно: проверяем, что клик пришёлся именно на #game-screen, а не на плитку
  // размера/уровня в меню — иначе тот же клик, которым запускается уровень,
  // сразу же засчитывал бы и первую цифру. ----------
  document.addEventListener('click', (e) => {
    if (!inGame || finished || !currentLevel.clickAnywhere) return;
    if (!gameScreen.contains(e.target)) return;
    const targetCell = grid.querySelector(`.cell[data-ord="${currentTarget}"]`);
    if (targetCell) handleCellClick(targetCell, currentTarget);
  });

  // Настройки мигания клеток для уровней с colorFeedback (сейчас — 3 и 4).
  // Цвет и прозрачность — CSS-переменные в :root (--flash-correct-color/opacity,
  // --flash-wrong-color/opacity). Длительность — тут, в миллисекундах.
  const FLASH_CORRECT_DURATION_MS = 100;
  const FLASH_WRONG_DURATION_MS = 100;

  // Общая функция мигания клетки цветом на заданную длительность (мс).
  function flashCell(cell, cls, durationMs) {
    cell.classList.remove(cls);
    void cell.offsetWidth;
    cell.classList.add(cls);
    setTimeout(() => cell.classList.remove(cls), durationMs);
  }

  // Алфавит для уровней с revealLetter (7 и 8) — заглавные русские буквы.
  const ALPHABET_RU = 'АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';
  function randomRussianLetter() {
    return ALPHABET_RU[Math.floor(Math.random() * ALPHABET_RU.length)];
  }

  function handleCellClick(cell, ord) {
    if (finished || cell.classList.contains('static-empty')) return;

    if (cell.dataset.cleared === '1') {
      // Уже отвечена правильно. На обычных уровнях клетка после верного
      // ответа некликабельна (см. ниже), поэтому сюда попадаем только
      // на уровнях с colorFeedback — там повторный клик мигает красным.
      if (currentLevel.colorFeedback) flashCell(cell, 'flash-wrong', FLASH_WRONG_DURATION_MS);
      return;
    }

    if (ord !== currentTarget) {
      mistakes++;
      if (currentLevel.colorFeedback) {
        flashCell(cell, 'flash-wrong', FLASH_WRONG_DURATION_MS);
      } else {
        cell.classList.remove('shake');
        void cell.offsetWidth;
        cell.classList.add('shake');
      }
      return;
    }

    cell.dataset.cleared = '1';

    if (currentLevel.colorFeedback) {
      // Число не исчезает, клетка остаётся кликабельной специально
      // для того, чтобы повторный клик по ней мигал красным (см. выше).
      flashCell(cell, 'flash-correct', FLASH_CORRECT_DURATION_MS);
    } else if (currentLevel.revealLetter) {
      // Число заменяется случайной заглавной русской буквой и остаётся видимым.
      cell.textContent = randomRussianLetter();
      cell.style.pointerEvents = 'none';
    } else {
      cell.textContent = '';
      cell.style.pointerEvents = 'none';
    }

    currentTarget++;

    if (currentTarget > total) {
      finishGame();
    }
  }

  function formatTime(ms) {
    const totalCs = Math.floor(ms / 10);
    const cs = totalCs % 100;
    const totalSec = Math.floor(totalCs / 100);
    const sec = totalSec % 60;
    const min = Math.floor(totalSec / 60);
    const pad = v => String(v).padStart(2, '0');
    return `${pad(min)}:${pad(sec)}:${pad(cs)}`;
  }

  function finishGame() {
    const elapsed = performance.now() - startTime;
    saveBestIfBetter(currentSize, elapsed); // рекорд считается всегда, даже при instantRestart

    if (currentLevel.instantRestart) {
      // Без плашки с результатом — сразу новая таблица того же размера.
      buildGrid(currentSize);
      return;
    }

    finished = true;
    finishTime.textContent = formatTime(elapsed);
    finishErrors.textContent = 'ОШИБОК: ' + mistakes;
    gridWrap.style.display = 'none';
    finishOverlay.classList.add('show');
    updateEyeVisibility();
  }

  // ---------- РЕКОРДЫ: строка под каждой плиткой, видна пока зажата R/К ----------
  let recordsOn = false;

  function refreshTileRecords() {
    sizes.forEach(n => {
      const ms = loadBest(n);
      tileRecordEls[n].textContent = ms !== null ? formatTime(ms) : '00:00:00';
    });
  }

  function updateRecordsVisibility() {
    if (recordsOn) refreshTileRecords();
    sizes.forEach(n => {
      tileRecordEls[n].classList.toggle('show', recordsOn);
    });
  }

  // ---------- ОКНО ИНФОРМАЦИИ: во весь экран, пока зажата I/Ш ----------
  let infoOn = false;

  function updateInfoVisibility() {
    infoOverlay.classList.toggle('show', infoOn);
  }

  // ---------- клавиатура ----------
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && e.code === 'KeyR') { // Ctrl+Shift+R — сброс рекордов ТЕКУЩЕГО уровня
      e.preventDefault();
      resetCurrentLevelRecords();
      return;
    }

    if (e.code === 'KeyR') { // R (англ.) / К (рус.) — показать рекорды под плитками, пока зажата
      e.preventDefault();
      if (!recordsOn) {
        recordsOn = true;
        updateRecordsVisibility();
      }
    }

    if (e.code === 'KeyI') { // I (англ.) / Ш (рус.) — окно информации на весь экран, пока зажата
      e.preventDefault();
      if (!infoOn) {
        infoOn = true;
        updateInfoVisibility();
      }
    }

    if (inGame) {
      if (e.code === 'KeyU') { // U (англ.) / Г (рус.) — вкл/выкл глаз (только во время игры)
        e.preventDefault();
        eyeOn = !eyeOn;
        updateEyeVisibility();
      }
      if (e.code === 'KeyK') { // K (англ.) / Л (рус.) — уменьшить прозрачность глаза (мин 10%)
        e.preventDefault();
        eyeOpacity = Math.max(0.1, +(eyeOpacity - 0.1).toFixed(2));
        saveNum('schulte-eye-opacity', eyeOpacity);
        applyEyeStyle();
      }
      if (e.code === 'KeyL') { // L (англ.) / Д (рус.) — увеличить прозрачность глаза (макс 100%)
        e.preventDefault();
        eyeOpacity = Math.min(1, +(eyeOpacity + 0.1).toFixed(2));
        saveNum('schulte-eye-opacity', eyeOpacity);
        applyEyeStyle();
      }
      if (e.code === 'KeyP') { // P (англ.) / З (рус.) — увеличить размер глаза
        e.preventDefault();
        eyeSize += 10;
        saveNum('schulte-eye-size', eyeSize);
        applyEyeStyle();
      }
      if (e.code === 'KeyO') { // O (англ.) / Щ (рус.) — уменьшить размер глаза
        e.preventDefault();
        eyeSize = Math.max(20, eyeSize - 10);
        saveNum('schulte-eye-size', eyeSize);
        applyEyeStyle();
      }
    }

    if (!inGame) return;

    if (e.code === 'Space') {
      e.preventDefault();
      buildGrid(currentSize);
      return;
    }
    if (e.code === 'Escape') {
      e.preventDefault();
      showMenu();
      return;
    }
    if (e.key === '+' || e.key === '=' || e.code === 'NumpadAdd') {
      e.preventDefault();
      scale = +(scale + 0.1).toFixed(2);
      saveScale(currentSize, scale);
      resizeGrid();
      return;
    }
    if (e.key === '-' || e.code === 'NumpadSubtract') {
      e.preventDefault();
      scale = Math.max(0.2, +(scale - 0.1).toFixed(2));
      saveScale(currentSize, scale);
      resizeGrid();
      return;
    }
  });

  document.addEventListener('keyup', (e) => {
    if (e.code === 'KeyR') { // отпустили R/К — прячем рекорды под плитками
      recordsOn = false;
      updateRecordsVisibility();
    }
    if (e.code === 'KeyI') { // отпустили I/Ш — прячем окно информации
      infoOn = false;
      updateInfoVisibility();
    }
  });

  // ---------- средняя кнопка мыши: подсказка нужной цифры ----------
  document.addEventListener('mousedown', (e) => {
    if (e.button === 1) {
      e.preventDefault();
      if (inGame && !finished) {
        peekOverlay.textContent = currentLevel.label(currentTarget, total);
        peekOverlay.style.fontSize = currentFontSize + 'px';
        peekOverlay.classList.add('show');
      }
    }
  });

  document.addEventListener('mouseup', (e) => {
    if (e.button === 1) {
      peekOverlay.classList.remove('show');
    }
  });

  document.addEventListener('auxclick', (e) => {
    if (e.button === 1) e.preventDefault();
  });

  // ---------- колесо мыши: навигация ----------
  document.addEventListener('wheel', (e) => {
    if (inGame) {
      if (e.deltaY > 0) {
        buildGrid(currentSize);
      } else if (e.deltaY < 0) {
        showMenu();
      }
    }
  }, { passive: true });

  showMenu();
</script>

</body>
</html>
